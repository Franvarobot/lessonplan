// ============================================================
// Lesson library — saved lessons in localStorage, auto-versioned
// by (stage, grade, subject, topic). Same parameters → v2, v3…
// ============================================================
const LIBRARY_KEY = "lektionsplaneraren-library-v1";

function libraryKeyFor({ stage, grade, subject, topic }) {
  return [stage, grade, subject, (topic || "").trim().toLowerCase()].join("|");
}

function loadLibrary() {
  try {
    const raw = localStorage.getItem(LIBRARY_KEY);
    if (!raw) return { schema: 1, items: {} };
    const parsed = JSON.parse(raw);
    return parsed?.items ? parsed : { schema: 1, items: {} };
  } catch {
    return { schema: 1, items: {} };
  }
}

function saveLibrary(data) {
  try {
    localStorage.setItem(LIBRARY_KEY, JSON.stringify(data));
    window.dispatchEvent(new Event("lp-library-change"));
  } catch (e) {
    console.error("Library save failed", e);
  }
}

const lessonLibrary = {
  // Append a version. Returns the new version number.
  add({ stage, grade, subject, topic, duration, lesson }) {
    const data = loadLibrary();
    const key = libraryKeyFor({ stage, grade, subject, topic });
    const entry = data.items[key] || {
      stage, grade, subject, topic, duration,
      versions: [],
    };
    const nextV = (entry.versions[entry.versions.length - 1]?.v || 0) + 1;
    entry.versions.push({
      v: nextV,
      savedAt: Date.now(),
      lesson,
      duration,
    });
    data.items[key] = entry;
    saveLibrary(data);
    return nextV;
  },
  getEntry({ stage, grade, subject, topic }) {
    return loadLibrary().items[libraryKeyFor({ stage, grade, subject, topic })];
  },
  getAll() {
    const data = loadLibrary();
    return Object.entries(data.items).map(([key, entry]) => ({ key, ...entry }));
  },
  remove(key) {
    const data = loadLibrary();
    delete data.items[key];
    saveLibrary(data);
  },
  exportAll() { return loadLibrary(); },
  importAll(payload) {
    if (!payload || typeof payload !== "object" || !payload.items) return false;
    saveLibrary({ schema: 1, items: payload.items });
    return true;
  },
};

// Hook: rerender when library changes (same tab or cross-tab).
function useLibraryVersion() {
  const [tick, setTick] = useState(0);
  useEffect(() => {
    const onChange = () => setTick(t => t + 1);
    window.addEventListener("lp-library-change", onChange);
    window.addEventListener("storage", onChange);
    return () => {
      window.removeEventListener("lp-library-change", onChange);
      window.removeEventListener("storage", onChange);
    };
  }, []);
  return tick;
}

function safeJsonParse(text) {
  const cleaned = text.replace(/```json|```/g, "").trim();
  try {
    return JSON.parse(cleaned);
  } catch (e) {
    // Fallback: try to repair truncated JSON by closing strings/braces/brackets
    let repaired = cleaned;
    // Remove trailing comma if any
    repaired = repaired.replace(/,\s*$/, "");
    // Count unbalanced quotes — if odd, the last string is unterminated
    let inString = false;
    let escape = false;
    let lastSafeIdx = 0;
    for (let i = 0; i < repaired.length; i++) {
      const c = repaired[i];
      if (escape) { escape = false; continue; }
      if (c === "\\") { escape = true; continue; }
      if (c === '"') { inString = !inString; if (!inString) lastSafeIdx = i + 1; }
      else if (!inString && (c === "}" || c === "]" || c === ",")) lastSafeIdx = i + 1;
    }
    repaired = repaired.slice(0, lastSafeIdx).replace(/,\s*$/, "");
    // Balance braces and brackets
    const opens = (repaired.match(/[{[]/g) || []).length;
    const closes = (repaired.match(/[}\]]/g) || []).length;
    const stack = [];
    for (const c of repaired) {
      if (c === "{") stack.push("}");
      else if (c === "[") stack.push("]");
      else if (c === "}" || c === "]") stack.pop();
    }
    while (stack.length) repaired += stack.pop();
    try {
      return JSON.parse(repaired);
    } catch (e2) {
      throw new Error(`Modellen returnerade ofullständig JSON. Försök igen, eller välj en annan modell. (${e.message})`);
    }
  }
}

async function callGemini({ apiKey, prompt, model }) {
  const url = `https://generativelanguage.googleapis.com/v1beta/models/${model || "gemini-2.5-flash"}:generateContent?key=${apiKey}`;
  const res = await fetch(url, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      contents: [{ parts: [{ text: prompt }] }],
      generationConfig: { temperature: 0.7, maxOutputTokens: 32768, responseMimeType: "application/json" },
    }),
  });
  if (!res.ok) throw new Error(`Gemini ${res.status}: ${await res.text()}`);
  const data = await res.json();
  const text = data?.candidates?.[0]?.content?.parts?.[0]?.text || "";
  return safeJsonParse(text);
}

async function callAnthropic({ apiKey, prompt, model }) {
  const res = await fetch("https://api.anthropic.com/v1/messages", {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "x-api-key": apiKey,
      "anthropic-version": "2023-06-01",
      "anthropic-dangerous-direct-browser-access": "true",
    },
    body: JSON.stringify({
      model: model || "claude-sonnet-4-5-20250929",
      max_tokens: 16384,
      messages: [{ role: "user", content: prompt }],
    }),
  });
  if (!res.ok) throw new Error(`Anthropic ${res.status}: ${await res.text()}`);
  const data = await res.json();
  const text = data.content.filter((b) => b.type === "text").map((b) => b.text).join("");
  return safeJsonParse(text);
}

async function callLocal({ baseUrl, apiKey, prompt, model }) {
  const url = `${baseUrl.replace(/\/$/, "")}/v1/chat/completions`;
  const res = await fetch(url, {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      ...(apiKey ? { Authorization: `Bearer ${apiKey}` } : {}),
    },
    body: JSON.stringify({
      model: model || "local-model",
      messages: [{ role: "user", content: prompt }],
      temperature: 0.8,
    }),
  });
  if (!res.ok) throw new Error(`Local ${res.status}: ${await res.text()}`);
  const data = await res.json();
  const text = data?.choices?.[0]?.message?.content || "";
  return safeJsonParse(text);
}

async function runLLM(config, prompt) {
  if (config.provider === "gemini") return callGemini({ apiKey: config.geminiKey, prompt, model: config.geminiModel });
  if (config.provider === "anthropic") return callAnthropic({ apiKey: config.anthropicKey, prompt, model: config.anthropicModel });
  if (config.provider === "local") return callLocal({ baseUrl: config.localUrl, apiKey: config.localKey, prompt, model: config.localModel });
  throw new Error("No provider configured");
}

Detta är förslag ${branchIndex + 1} av ${totalBranches}. Varje förslag ska ha en TYDLIGT annorlunda pedagogisk vinkel — välj en av dessa modeller och säg vilken i fältet "approach":
1. STRUKTURERAD UNDERVISNING (Direct Instruction) — Skolverkets sex-stegsmodell. Standard för faktakunskap, färdighetsträning, matematik, språkregler. Faserna är: "Inledning", "Genomgång", "Stödd övning", "Sammanfattning och kontroll", "Enskild övning", "Avslutning".
2. PROBLEMBASERAT — eleverna brottas med ett problem först, läraren hjälper fram lösningen. För matematik, naturvetenskap, etiska frågor.
3. UNDERSÖKANDE / LABORATIVT — eleverna utforskar konkret material för att upptäcka samband. För NO, matematik, samhällsfrågor.
4. KOLLABORATIVT / DIALOGISKT — strukturerade gruppdiskussioner (t.ex. think-pair-share, EPA). För litteratur, samhällsämnen, värdefrågor.
5. SKAPANDE / GESTALTANDE — eleverna producerar något (text, bild, modell, framträdande). För svenska, bild, slöjd, musik.
6. PROJEKTBASERAT — längre arbete mot konkret produkt. När det passar lektionstiden, ofta del-fas av större projekt.

GRUNDREGLER FÖR EN VERKLIG LEKTIONSPLAN:
- ALDRIG vaga formuleringar som "diskutera ämnet", "introducera begreppet", "samtala om". Skriv UT vad läraren säger, vilken fråga som ställs, vilket exempel som ges.
- VARJE fas i "phases" ska ha "teacherScript" — exempel-formuleringar i citattecken som läraren faktiskt kan säga. Inte hela monologer men nyckelmeningar.
- VARJE fas ska ha "anticipatedResponses" — vad eleverna kan tänkas svara, inklusive vanliga felsvar och hur läraren kan vända dem.
- "kontrollfrågor" (3-5 st) — exakta frågor läraren ställer för att kolla att eleverna hänger med, INTE handuppräckning utan riktade till specifika elever (Skolverkets råd).

function Button({ variant = "secondary", icon, children, onClick, disabled, type = "button", style = {} }) {
  const variants = {
    primary: { background: "var(--accent)", color: "#fff", border: "1px solid var(--accent)" },
    primaryHover: { background: "var(--accent-hover)" },
    secondary: { background: "var(--bg-surface)", color: "var(--text-primary)", border: "1px solid var(--border-default)" },
    secondaryHover: { background: "var(--bg-secondary)", borderColor: "var(--border-strong)" },
    yellow: { background: "#F5C518", color: "#1A1A1A", border: "1px solid #C9A013" },
    yellowHover: { background: "#E8B814" },
    ghost: { background: "transparent", color: "var(--text-secondary)", border: "1px solid transparent" },
    ghostHover: { background: "var(--bg-secondary)", color: "var(--text-primary)" },
    danger: { background: "var(--bg-surface)", color: "var(--danger-text)", border: "1px solid var(--border-default)" },
    dangerHover: { background: "var(--danger-bg)", borderColor: "var(--danger-text)" },
  };
  const [hover, setHover] = useState(false);
  const base = variants[variant] || variants.secondary;
  const hoverStyles = !disabled && hover ? variants[variant + "Hover"] || {} : {};
  return (
    <button type={type} onClick={onClick} disabled={disabled}
      onMouseEnter={() => setHover(true)} onMouseLeave={() => setHover(false)}
      style={{
        display: "inline-flex", alignItems: "center", gap: 6,
        padding: "8px 14px", fontSize: 13, fontWeight: 500,
        borderRadius: "var(--radius-md)", transition: "all 0.12s",
        whiteSpace: "nowrap",
        ...base, ...hoverStyles, ...style,
      }}>
      {icon}
      {children}
    </button>
  );
}

function LibraryModal({ onClose, onLoad, t }) {
  useLibraryVersion();
  const items = lessonLibrary.getAll().sort((a, b) => {
    const aT = a.versions[a.versions.length - 1]?.savedAt || 0;
    const bT = b.versions[b.versions.length - 1]?.savedAt || 0;
    return bT - aT;
  });
  const fileRef = useRef(null);
  const [toast, setToast] = useState("");

  function showToast(m) { setToast(m); setTimeout(() => setToast(""), 1600); }

  function handleExport() {
    const payload = lessonLibrary.exportAll();
    const blob = new Blob([JSON.stringify(payload, null, 2)], { type: "application/json" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = `lektionsbibliotek-${new Date().toISOString().slice(0, 10)}.json`;
    a.click();
    URL.revokeObjectURL(url);
    showToast(t.exportDone);
  }

  function handleImport(e) {
    const file = e.target.files?.[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = ev => {
      try {
        const parsed = JSON.parse(ev.target.result);
        if (!confirm(t.importConfirm)) { e.target.value = ""; return; }
        const ok = lessonLibrary.importAll(parsed);
        showToast(ok ? t.importDone : t.importInvalid);
      } catch { showToast(t.importInvalid); }
      e.target.value = "";
    };
    reader.readAsText(file);
  }

  function handleDelete(key) {
    if (!confirm(t.deleteVersionGroupConfirm)) return;
    lessonLibrary.remove(key);
  }

  return (
    <div onClick={onClose} style={{
      position: "fixed", inset: 0, background: "rgba(0,0,0,0.45)",
      display: "flex", alignItems: "flex-start", justifyContent: "center",
      padding: "40px 16px", zIndex: 50, overflowY: "auto",
    }}>
      <div onClick={(e) => e.stopPropagation()} style={{
        background: "var(--bg-surface)", borderRadius: "var(--radius-lg)",
        maxWidth: 720, width: "100%", maxHeight: "90vh", overflow: "auto",
        boxShadow: "var(--shadow-md)",
      }}>
        <div style={{
          padding: "16px 22px", borderBottom: "1px solid var(--border-subtle)",
          display: "flex", alignItems: "center", justifyContent: "space-between",
          gap: 12, flexWrap: "wrap",
        }}>
          <div>
            <h2 style={{ fontSize: 16, fontWeight: 600 }}>{t.savedLessonsTitle}</h2>
            <p style={{ fontSize: 12, color: "var(--text-secondary)", marginTop: 2 }}>{t.savedLessonsDesc}</p>
          </div>
          <div style={{ display: "flex", gap: 6 }}>
            <button onClick={handleExport} style={smallBtn}>↓ {t.exportLibrary}</button>
            <button onClick={() => fileRef.current?.click()} style={smallBtn}>↑ {t.importLibrary}</button>
            <button onClick={onClose} style={smallBtn}>✕</button>
            <input ref={fileRef} type="file" accept=".json,application/json" onChange={handleImport} style={{ display: "none" }} />
          </div>
        </div>

        <div style={{ padding: "12px 22px 22px" }}>
          {items.length === 0 ? (
            <div style={{
              padding: 40, textAlign: "center", color: "var(--text-tertiary)",
              fontSize: 13, border: "1px dashed var(--border-default)",
              borderRadius: "var(--radius-md)",
            }}>
              {t.noSavedLessons}
            </div>
          ) : (
            <div style={{ display: "flex", flexDirection: "column", gap: 12 }}>
              {items.map(entry => (
                <LibraryEntry
                  key={entry.key}
                  entry={entry}
                  t={t}
                  onLoad={(ver) => onLoad({ entry, ver })}
                  onDelete={() => handleDelete(entry.key)}
                />
              ))}
            </div>
          )}
          {toast && (
            <div style={{
              marginTop: 12, padding: "6px 12px",
              background: "var(--accent-bg)", color: "var(--accent)",
              borderRadius: "var(--radius-sm)", fontSize: 12, textAlign: "center",
            }}>{toast}</div>
          )}
        </div>
      </div>
    </div>
  );
}

const smallBtn = {
  padding: "5px 10px", fontSize: 12,
  background: "transparent", color: "var(--text-secondary)",
  border: "1px solid var(--border-default)",
  borderRadius: "var(--radius-sm)", cursor: "pointer",
};

function LibraryEntry({ entry, t, onLoad, onDelete }) {
  const latest = entry.versions[entry.versions.length - 1];
  return (
    <div style={{
      border: "1px solid var(--border-subtle)",
      borderRadius: "var(--radius-md)",
      padding: "12px 14px",
    }}>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", gap: 10, marginBottom: 8 }}>
        <div style={{ minWidth: 0 }}>
          <div style={{ fontSize: 14, fontWeight: 600, marginBottom: 2 }}>
            {latest?.lesson?.title || entry.topic}
          </div>
          <div style={{ fontSize: 12, color: "var(--text-tertiary)" }}>
            {entry.stage} · {entry.grade} · {entry.subject} · {entry.topic || "—"}
          </div>
        </div>
        <button onClick={onDelete} title={t.deleteVersionGroup} style={{
          ...smallBtn, color: "var(--warning-text)", padding: "4px 8px",
        }}>✕</button>
      </div>
      <div style={{ display: "flex", flexWrap: "wrap", gap: 6 }}>
        {entry.versions.map(ver => (
          <button
            key={ver.v}
            onClick={() => onLoad(ver)}
            title={`${t.savedAtLabel} ${new Date(ver.savedAt).toLocaleString()}`}
            style={{
              display: "inline-flex", alignItems: "center", gap: 5,
              padding: "4px 10px", fontSize: 12, fontWeight: 500,
              background: "var(--bg-secondary)", color: "var(--text-primary)",
              border: "1px solid var(--border-subtle)",
              borderRadius: 12, cursor: "pointer",
            }}
          >
            v{ver.v}
            <span style={{ fontSize: 10, color: "var(--text-tertiary)", fontWeight: 400 }}>
              · {new Date(ver.savedAt).toLocaleDateString()}
            </span>
          </button>
        ))}
      </div>
    </div>
  );
}

function SavedCountInline() {
  useLibraryVersion();
  const total = lessonLibrary.getAll().reduce((sum, e) => sum + e.versions.length, 0);
  if (total === 0) return null;
  return (
    <span style={{
      marginLeft: 6, fontSize: 11, fontWeight: 600,
      background: "var(--accent-bg)", color: "var(--accent)",
      padding: "1px 7px", borderRadius: 10,
    }}>{total}</span>
  );
}

function VersionBadge({ providerLabel, savedCount, onOpenLibrary }) {
  return (
    <div className="no-print" style={{
      position: "fixed", bottom: 10, right: 10, zIndex: 40,
      display: "flex", alignItems: "center", gap: 6,
      pointerEvents: "auto",
    }}>
      {savedCount > 0 && (
        <button onClick={onOpenLibrary} style={{
          fontSize: 10, fontWeight: 500,
          padding: "3px 8px",
          background: "var(--bg-surface)",
          color: "var(--text-secondary)",
          border: "1px solid var(--border-subtle)",
          borderRadius: 10, cursor: "pointer",
          opacity: 0.7,
          transition: "opacity 0.15s",
        }}
        onMouseEnter={(e) => e.currentTarget.style.opacity = "1"}
        onMouseLeave={(e) => e.currentTarget.style.opacity = "0.7"}
        title="Sparade lektioner / Saved lessons"
        >
          {savedCount} ✓
        </button>
      )}
      <span style={{
        fontSize: 10, fontWeight: 500,
        padding: "3px 8px",
        background: "var(--bg-surface)",
        color: "var(--text-tertiary)",
        border: "1px solid var(--border-subtle)",
        borderRadius: 10,
        opacity: 0.55,
        userSelect: "none",
      }}
      title={providerLabel}
      >
        v{APP_VERSION}
      </span>
    </div>
  );
}

function SettingsModal({ config, onSave, onClose, t }) {

  return (
    <div style={{ position: "fixed", inset: 0, background: "rgba(0,0,0,0.4)", display: "flex", alignItems: "center", justifyContent: "center", zIndex: 50, padding: 20 }} onClick={onClose}>
      <div onClick={(e) => e.stopPropagation()} style={{ background: "var(--bg-surface)", borderRadius: "var(--radius-lg)", maxWidth: 540, width: "100%", maxHeight: "90vh", overflow: "auto", boxShadow: "var(--shadow-md)" }}>
        <div style={{ padding: "18px 24px", borderBottom: "1px solid var(--border-subtle)", display: "flex", alignItems: "center", justifyContent: "space-between" }}>
          <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
            <Icon name="settings" size={18} />
            <h2 style={{ fontSize: 16, fontWeight: 600 }}>{t.settings}</h2>
          </div>
          <button onClick={onClose} style={{ background: "transparent", border: "none", padding: 6, color: "var(--text-secondary)", borderRadius: "var(--radius-sm)" }}>
            <Icon name="x" size={18} />

        </div>

        <div style={{ padding: 24, display: "flex", flexDirection: "column", gap: 18 }}>
          <Field label={t.language}>
            <div style={{ display: "flex", gap: 0, border: "1px solid var(--border-default)", borderRadius: "var(--radius-md)", overflow: "hidden", width: "fit-content" }}>
              {[["sv", "Svenska"], ["en", "English"]].map(([code, label]) => (
                <button key={code} onClick={() => update("language", code)} style={{
                  padding: "8px 16px", fontSize: 13, fontWeight: 500, border: "none",
                  background: draft.language === code ? "var(--accent)" : "var(--bg-surface)",
                  color: draft.language === code ? "#fff" : "var(--text-primary)",
                  cursor: "pointer", transition: "all 0.12s",

              ))}

          </Field>

          <Field label={t.provider}>

              {[
                { id: "gemini", label: "Google Gemini" },
                { id: "anthropic", label: "Anthropic" },
                { id: "local", label: "Lokal modell" },
              ].map(p => (
                <button key={p.id} onClick={() => update("provider", p.id)} style={{
                  padding: "12px 10px", fontSize: 13, fontWeight: 500,
                  border: `1px solid ${draft.provider === p.id ? "var(--accent)" : "var(--border-default)"}`,
                  borderRadius: "var(--radius-md)",
                  background: draft.provider === p.id ? "var(--accent-bg)" : "var(--bg-surface)",

                }}>{p.label}</button>
              ))}
            </div>
          </Field>

          {draft.provider === "gemini" && (
            <>
              <Field label={t.apiKey} hint={t.geminiHelp}>
                <Input type="password" value={draft.geminiKey} onChange={(e) => update("geminiKey", e.target.value)} placeholder="AIza..." />
              </Field>
              <Field label={t.model}>
                <Select value={draft.geminiModel} onChange={(e) => update("geminiModel", e.target.value)}>
                  <option value="gemini-2.5-flash">gemini-2.5-flash (rekommenderad, snabb + gratis)</option>
                  <option value="gemini-2.5-flash-lite">gemini-2.5-flash-lite (snabbast, billigast)</option>
                  <option value="gemini-2.5-pro">gemini-2.5-pro (mest kapabel)</option>
                  <option value="gemini-3.1-flash-preview">gemini-3.1-flash-preview (nyaste)</option>
                  <option value="gemini-3.1-pro-preview">gemini-3.1-pro-preview (nyaste, kraftfullast)</option>
                </Select>
              </Field>
            </>
          )}

          {draft.provider === "anthropic" && (
            <>
              <Field label={t.apiKey} hint={t.anthropicHelp}>
                <Input type="password" value={draft.anthropicKey} onChange={(e) => update("anthropicKey", e.target.value)} placeholder="sk-ant-..." />
              </Field>
              <Field label={t.model}>
                <Select value={draft.anthropicModel} onChange={(e) => update("anthropicModel", e.target.value)}>
                  <option value="claude-sonnet-4-5-20250929">claude-sonnet-4-5</option>
                  <option value="claude-opus-4-5">claude-opus-4-5</option>
                  <option value="claude-haiku-4-5-20251001">claude-haiku-4-5</option>
                </Select>
              </Field>
            </>
          )}

          {draft.provider === "local" && (
            <>
              <Field label={t.baseUrl} hint={t.localHelp}>
                <Input value={draft.localUrl} onChange={(e) => update("localUrl", e.target.value)} placeholder="http://localhost:1234" />
              </Field>
              <Field label={t.model}>
                <Input value={draft.localModel} onChange={(e) => update("localModel", e.target.value)} placeholder="local-model" />
              </Field>
              <Field label={`${t.apiKey} (valfritt)`}>
                <Input type="password" value={draft.localKey} onChange={(e) => update("localKey", e.target.value)} placeholder="(lämna tomt om inte krävs)" />

          <div style={{ fontSize: 12, color: "var(--text-tertiary)", padding: "10px 12px", background: "var(--bg-secondary)", borderRadius: "var(--radius-md)" }}>

        <div style={{ padding: "14px 24px", borderTop: "1px solid var(--border-subtle)", display: "flex", justifyContent: "flex-end", gap: 8 }}>
          <Button variant="secondary" onClick={onClose}>{t.close}</Button>
          <Button variant="primary" onClick={() => { onSave(draft); onClose(); }}>{t.save}</Button>
        </div>
      </div>
    </div>
  );
}

// LESSON CARD
// ============================================================
function LessonCard({ lesson, t, onPick, isOption, optionLabel, version }) {
  // For options (preview cards) we show a compact preview; for the accepted lesson we show everything.
  const compact = isOption;
  const accent = lesson.isSub ? "#E8C547" : "var(--accent)";
  const totalMin = lesson.phases ? lesson.phases.reduce((s, p) => s + (p.minutes || 0), 0) : null;

  return (
    <div style={{
      background: "var(--bg-surface)",
      border: `1px solid ${lesson.isSub ? "#E8C547" : "var(--border-subtle)"}`,
      borderLeft: `3px solid ${accent}`,
      borderRadius: "var(--radius-md)",
      padding: "18px 22px",
      position: "relative",
    }}>
      {/* HEADER */}
      <div style={{ display: "flex", alignItems: "flex-start", justifyContent: "space-between", gap: 12, marginBottom: 12, flexWrap: "wrap" }}>
        <div style={{ flex: 1, minWidth: 0 }}>
          <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 6, flexWrap: "wrap" }}>
            {isOption && optionLabel && (
              <span style={{ fontSize: 11, fontWeight: 600, color: "var(--accent)", background: "var(--accent-bg)", padding: "2px 8px", borderRadius: "var(--radius-sm)", letterSpacing: "0.05em" }}>
                {optionLabel}
              </span>
            )}
            {lesson.isSub && (
              <span style={{ fontSize: 11, fontWeight: 600, color: "var(--warning-text)", background: "var(--warning-bg)", padding: "2px 8px", borderRadius: "var(--radius-sm)", letterSpacing: "0.05em" }}>
                {t.substituteLesson}
              </span>
            )}
            <span style={{ fontSize: 11, fontWeight: 500, color: "var(--text-tertiary)", textTransform: "uppercase", letterSpacing: "0.05em" }}>
              {lesson.approach}
            </span>
            {version != null && (
              <span title={`${t.versionBadge} ${version}`} style={{
                fontSize: 10, fontWeight: 600,
                color: "var(--text-tertiary)",
                background: "var(--bg-secondary)",
                padding: "1px 7px", borderRadius: 10,
                letterSpacing: "0.02em",
              }}>
                v{version}
              </span>
            )}
          </div>
          <h3 style={{ fontSize: 18, fontWeight: 600, color: "var(--text-primary)", marginBottom: 4, lineHeight: 1.3 }}>{lesson.title}</h3>
          <p style={{ fontSize: 13, color: "var(--text-secondary)", lineHeight: 1.5 }}>{lesson.summary}</p>
          {lesson.approachReason && (
            <p style={{ fontSize: 12, color: "var(--text-tertiary)", lineHeight: 1.5, marginTop: 4, fontStyle: "italic" }}>↳ {lesson.approachReason}</p>
          )}
        </div>
        {totalMin && (
          <div style={{ display: "flex", alignItems: "center", gap: 4, fontSize: 12, color: "var(--text-tertiary)", whiteSpace: "nowrap" }}>
            <Icon name="clock" size={12} />
            <span>{totalMin} min</span>
          </div>
        )}
      </div>

      <div style={{ display: "grid", gap: 16 }}>
        {/* AT-A-GLANCE — three column row of objective / prior knowledge / criteria */}
        <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(180px, 1fr))", gap: 12 }}>
          <div style={{ background: "var(--accent-bg)", borderRadius: "var(--radius-md)", padding: "10px 12px" }}>
            <div style={{ fontSize: 10, fontWeight: 600, color: "var(--accent)", textTransform: "uppercase", letterSpacing: "0.05em", marginBottom: 4 }}>{t.objective}</div>
            <p style={{ fontSize: 13, lineHeight: 1.5 }}>{lesson.learningGoal || lesson.objective}</p>
          </div>
          {lesson.priorKnowledge && (
            <div style={{ background: "var(--bg-secondary)", borderRadius: "var(--radius-md)", padding: "10px 12px" }}>
              <div style={{ fontSize: 10, fontWeight: 600, color: "var(--text-tertiary)", textTransform: "uppercase", letterSpacing: "0.05em", marginBottom: 4 }}>{t.priorKnowledge}</div>
              <p style={{ fontSize: 13, lineHeight: 1.5 }}>{lesson.priorKnowledge}</p>
            </div>
          )}
          {lesson.successCriteria && lesson.successCriteria.length > 0 && (
            <div style={{ background: "#F0F7F2", borderRadius: "var(--radius-md)", padding: "10px 12px" }}>
              <div style={{ fontSize: 10, fontWeight: 600, color: "var(--success-text)", textTransform: "uppercase", letterSpacing: "0.05em", marginBottom: 4 }}>{t.successCriteria}</div>
              <ul style={{ fontSize: 12, lineHeight: 1.5, listStyle: "none", display: "flex", flexDirection: "column", gap: 3 }}>
                {lesson.successCriteria.map((c, i) => <li key={i} style={{ display: "flex", gap: 4 }}><span style={{ color: "var(--success-text)" }}>✓</span><span>{c}</span></li>)}
              </ul>
            </div>
          )}
        </div>

        {/* Curriculum link */}
        {lesson.lgr22_connection && (
          <Section icon="book" label={t.lgr22}>
            <p style={{ fontSize: 13, lineHeight: 1.6, color: "var(--text-secondary)" }}>{lesson.lgr22_connection}</p>
          </Section>
        )}

        {/* Board layout */}
        {lesson.boardLayout && (
          <Section icon="layers" label={t.boardLayout}>
            <div style={{ background: "#F8F4EB", border: "1px dashed #C9A013", borderRadius: "var(--radius-md)", padding: "10px 14px", fontSize: 13, lineHeight: 1.6, fontFamily: "ui-monospace, Menlo, monospace" }}>
              {lesson.boardLayout}
            </div>
          </Section>
        )}

        {/* Materials */}
        {(lesson.materialsNeeded || lesson.materials) && (
          <Section icon="file" label={t.materials}>
            <ul style={{ fontSize: 13, lineHeight: 1.7, listStyle: "none", display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(200px, 1fr))", gap: "0 16px" }}>
              {(lesson.materialsNeeded || lesson.materials || []).map((m, i) => (
                <li key={i} style={{ display: "flex", gap: 6 }}>
                  <span style={{ color: "var(--text-tertiary)" }}>·</span>
                  <span>{m}</span>
                </li>
              ))}
            </ul>
          </Section>
        )}

        {/* PHASES */}
        {lesson.phases && lesson.phases.length > 0 && (
          <Section icon="layers" label={t.phases}>
            <div style={{ display: "flex", flexDirection: "column", gap: 12, marginTop: 4 }}>
              {lesson.phases.map((phase, i) => (
                <div key={i} style={{ background: "var(--bg-secondary)", border: "1px solid var(--border-subtle)", borderRadius: "var(--radius-md)", padding: "14px 16px" }}>
                  <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", gap: 8, marginBottom: 8 }}>
                    <div style={{ display: "flex", alignItems: "center", gap: 8, flexWrap: "wrap" }}>
                      <span style={{ fontSize: 11, fontWeight: 600, color: "var(--accent)", background: "var(--accent-bg)", padding: "2px 8px", borderRadius: "var(--radius-sm)" }}>
                        {i + 1}
                      </span>
                      <span style={{ fontSize: 14, fontWeight: 600 }}>{phase.name}</span>
                    </div>
                    <span style={{ fontSize: 11, color: "var(--text-tertiary)", display: "flex", alignItems: "center", gap: 3, whiteSpace: "nowrap" }}>
                      <Icon name="clock" size={11} />
                      {phase.minutes} min
                    </span>
                  </div>

                  {phase.purpose && (
                    <p style={{ fontSize: 12, fontStyle: "italic", color: "var(--text-tertiary)", marginBottom: 10, lineHeight: 1.5 }}>
                      {t.purposeLabel}: {phase.purpose}
                    </p>
                  )}

                  <div style={{ display: "grid", gridTemplateColumns: compact ? "1fr" : "1fr 1fr", gap: 14 }}>
                    {phase.teacherDoes && phase.teacherDoes.length > 0 && (
                      <div>
                        <div style={{ fontSize: 10, fontWeight: 600, color: "var(--text-tertiary)", textTransform: "uppercase", letterSpacing: "0.05em", marginBottom: 5 }}>
                          {t.teacherDoes}
                        </div>
                        <ul style={{ fontSize: 13, lineHeight: 1.55, listStyle: "none", display: "flex", flexDirection: "column", gap: 5 }}>
                          {phase.teacherDoes.map((s, j) => (
                            <li key={j} style={{ display: "flex", gap: 6 }}>
                              <span style={{ color: "var(--accent)", flexShrink: 0 }}>→</span>
                              <span>{s}</span>
                            </li>
                          ))}
                        </ul>
                      </div>
                    )}
                    {phase.studentsDo && phase.studentsDo.length > 0 && (
                      <div>
                        <div style={{ fontSize: 10, fontWeight: 600, color: "var(--text-tertiary)", textTransform: "uppercase", letterSpacing: "0.05em", marginBottom: 5 }}>
                          {t.studentsDo}
                        </div>
                        <ul style={{ fontSize: 13, lineHeight: 1.55, listStyle: "none", display: "flex", flexDirection: "column", gap: 5 }}>
                          {phase.studentsDo.map((s, j) => (
                            <li key={j} style={{ display: "flex", gap: 6 }}>
                              <span style={{ color: "var(--text-tertiary)", flexShrink: 0 }}>·</span>
                              <span>{s}</span>
                            </li>
                          ))}
                        </ul>
                      </div>
                    )}
                  </div>

                  {/* Teacher script — exact phrases */}
                  {phase.teacherScript && phase.teacherScript.length > 0 && (
                    <div style={{ marginTop: 12, padding: "10px 12px", background: "var(--bg-surface)", borderLeft: "3px solid var(--accent)", borderRadius: "var(--radius-sm)" }}>
                      <div style={{ fontSize: 10, fontWeight: 600, color: "var(--accent)", textTransform: "uppercase", letterSpacing: "0.05em", marginBottom: 5 }}>
                        💬 {t.teacherScript}
                      </div>
                      <ul style={{ fontSize: 13, lineHeight: 1.55, listStyle: "none", display: "flex", flexDirection: "column", gap: 5, fontStyle: "italic", color: "var(--text-primary)" }}>
                        {phase.teacherScript.map((s, j) => (
                          <li key={j}>"{s.replace(/^["']|["']$/g, "")}"</li>
                        ))}
                      </ul>
                    </div>
                  )}

                  {/* Anticipated responses */}
                  {phase.anticipatedResponses && phase.anticipatedResponses.length > 0 && (
                    <div style={{ marginTop: 10, padding: "10px 12px", background: "#FAF6FC", borderLeft: "3px solid #6B3E8E", borderRadius: "var(--radius-sm)" }}>
                      <div style={{ fontSize: 10, fontWeight: 600, color: "#6B3E8E", textTransform: "uppercase", letterSpacing: "0.05em", marginBottom: 5 }}>
                        🎯 {t.anticipatedResponses}
                      </div>
                      <ul style={{ fontSize: 12, lineHeight: 1.55, listStyle: "none", display: "flex", flexDirection: "column", gap: 4 }}>
                        {phase.anticipatedResponses.map((s, j) => (
                          <li key={j} style={{ display: "flex", gap: 6 }}>
                            <span style={{ color: "#6B3E8E", flexShrink: 0 }}>·</span>
                            <span>{s}</span>
                          </li>
                        ))}
                      </ul>
                    </div>
                  )}
                </div>
              ))}
            </div>
          </Section>
        )}

        {/* Legacy fallback */}
        {!lesson.phases && lesson.activities && (
          <Section icon="layers" label={t.activities}>
            <ol style={{ fontSize: 13, lineHeight: 1.6, paddingLeft: 18 }}>
              {lesson.activities.map((a, i) => <li key={i} style={{ marginBottom: 4 }}>{a}</li>)}
            </ol>
          </Section>
        )}

        {/* Check for understanding */}
        {lesson.checkForUnderstanding && lesson.checkForUnderstanding.length > 0 && (
          <Section icon="target" label={t.checkForUnderstanding}>
            <ol style={{ fontSize: 13, lineHeight: 1.6, paddingLeft: 18, display: "flex", flexDirection: "column", gap: 4 }}>
              {lesson.checkForUnderstanding.map((q, i) => <li key={i}>{q}</li>)}
            </ol>
          </Section>
        )}

        {/* EMBEDDED CONTENT (sub lessons) */}
        {lesson.embeddedContent && (
          <Section icon="book" label={t.embeddedContent}>
            {lesson.embeddedContent.description && (
              <p style={{ fontSize: 12, color: "var(--text-secondary)", marginBottom: 10, fontStyle: "italic" }}>
                {lesson.embeddedContent.description}
              </p>
            )}

            {lesson.embeddedContent.questions && lesson.embeddedContent.questions.length > 0 && (
              <div style={{ marginBottom: 12 }}>
                <div style={{ fontSize: 11, fontWeight: 600, color: "var(--text-tertiary)", textTransform: "uppercase", letterSpacing: "0.05em", marginBottom: 6 }}>
                  {t.embeddedQuestions}
                </div>
                <ol style={{ fontSize: 13, lineHeight: 1.55, paddingLeft: 18, display: "flex", flexDirection: "column", gap: 8 }}>
                  {lesson.embeddedContent.questions.map((q, i) => (
                    <li key={i}>
                      <div>{q.q}</div>
                      <div style={{ fontSize: 12, color: "var(--success-text)", marginTop: 2 }}>✓ {q.expectedAnswer}</div>
                      {q.ifStuck && <div style={{ fontSize: 11, color: "var(--text-tertiary)", marginTop: 2, fontStyle: "italic" }}>↳ Om de fastnar: {q.ifStuck}</div>}
                    </li>
                  ))}
                </ol>
              </div>
            )}

            {lesson.embeddedContent.problems && lesson.embeddedContent.problems.length > 0 && (
              <div style={{ marginBottom: 12 }}>
                <div style={{ fontSize: 11, fontWeight: 600, color: "var(--text-tertiary)", textTransform: "uppercase", letterSpacing: "0.05em", marginBottom: 6 }}>
                  {t.embeddedProblems}
                </div>
                <ol style={{ fontSize: 13, lineHeight: 1.55, paddingLeft: 18, display: "flex", flexDirection: "column", gap: 8 }}>
                  {lesson.embeddedContent.problems.map((p, i) => (
                    <li key={i}>
                      <div style={{ display: "flex", alignItems: "flex-start", gap: 8 }}>
                        <span style={{ flex: 1 }}>{p.problem}</span>
                        {p.difficulty && <span style={{ fontSize: 10, color: "var(--text-tertiary)", whiteSpace: "nowrap", marginTop: 2 }}>[{p.difficulty}]</span>}
                      </div>
                      <div style={{ fontSize: 12, color: "var(--success-text)", marginTop: 2 }}>✓ {p.answer}</div>
                    </li>
                  ))}
                </ol>
              </div>
            )}

            {lesson.embeddedContent.texts && lesson.embeddedContent.texts.length > 0 && (
              <div style={{ marginBottom: 12 }}>
                <div style={{ fontSize: 11, fontWeight: 600, color: "var(--text-tertiary)", textTransform: "uppercase", letterSpacing: "0.05em", marginBottom: 6 }}>
                  {t.embeddedTexts}
                </div>
                {lesson.embeddedContent.texts.map((tx, i) => (
                  <div key={i} style={{ background: "var(--bg-secondary)", border: "1px solid var(--border-subtle)", borderRadius: "var(--radius-md)", padding: "12px 14px", marginBottom: 8 }}>
                    <div style={{ fontSize: 13, fontWeight: 600, marginBottom: 6 }}>{tx.title}</div>
                    <p style={{ fontSize: 13, lineHeight: 1.6, marginBottom: 6, whiteSpace: "pre-wrap" }}>{tx.content}</p>
                    {tx.purpose && <div style={{ fontSize: 11, color: "var(--text-tertiary)", fontStyle: "italic" }}>↳ {tx.purpose}</div>}
                  </div>
                ))}
              </div>
            )}

            {lesson.embeddedContent.exampleAnswers && lesson.embeddedContent.exampleAnswers.length > 0 && (
              <div>
                <div style={{ fontSize: 11, fontWeight: 600, color: "var(--text-tertiary)", textTransform: "uppercase", letterSpacing: "0.05em", marginBottom: 6 }}>
                  {t.embeddedExamples}
                </div>
                <ul style={{ fontSize: 13, lineHeight: 1.55, listStyle: "none", display: "flex", flexDirection: "column", gap: 8 }}>
                  {lesson.embeddedContent.exampleAnswers.map((ex, i) => (
                    <li key={i} style={{ borderLeft: "2px solid var(--border-default)", paddingLeft: 10 }}>
                      <div style={{ fontSize: 12, color: "var(--text-secondary)", fontStyle: "italic", marginBottom: 2 }}>{ex.scenario}</div>
                      <div>→ "{ex.response}"</div>
                    </li>
                  ))}
                </ul>
              </div>
            )}
          </Section>
        )}

        {/* Exit ticket / exit exercise */}
        {(lesson.exitTicket || lesson.exitExercise) && (
          <div style={{ background: "#F0F7F2", border: "1px solid #C5DCC9", borderLeft: "3px solid var(--success-text)", borderRadius: "var(--radius-md)", padding: "12px 14px" }}>
            <div style={{ fontSize: 11, fontWeight: 600, color: "var(--success-text)", textTransform: "uppercase", letterSpacing: "0.05em", marginBottom: 6 }}>
              ✦ {lesson.exitTicket ? t.exitTicket : t.exitExerciseTitle}
            </div>
            <div style={{ fontSize: 14, fontWeight: 600, marginBottom: 4 }}>
              {(lesson.exitTicket || lesson.exitExercise).title}
            </div>
            <p style={{ fontSize: 13, lineHeight: 1.55 }}>
              {lesson.exitTicket ? lesson.exitTicket.task : lesson.exitExercise.description}
            </p>
            {lesson.exitTicket && lesson.exitTicket.purpose && (
              <p style={{ fontSize: 11, color: "var(--success-text)", fontStyle: "italic", marginTop: 4 }}>↳ {lesson.exitTicket.purpose}</p>
            )}
          </div>
        )}

        {/* Differentiation */}
        {lesson.differentiation && typeof lesson.differentiation === "object" && (lesson.differentiation.stod || lesson.differentiation.utmaning) && (
          <Section icon="users" label={t.differentiationTitle}>
            <div style={{ display: "grid", gridTemplateColumns: compact ? "1fr" : "1fr 1fr", gap: 12 }}>
              {lesson.differentiation.stod && (
                <div style={{ background: "#F4F8FC", border: "1px solid #D0DEEC", borderRadius: "var(--radius-md)", padding: "10px 12px" }}>
                  <div style={{ fontSize: 11, fontWeight: 600, color: "var(--accent)", marginBottom: 5 }}>
                    🤝 {t.differentiationStod}
                  </div>
                  <ul style={{ fontSize: 13, lineHeight: 1.55, listStyle: "none", display: "flex", flexDirection: "column", gap: 4 }}>
                    {lesson.differentiation.stod.map((s, i) => <li key={i}>· {s}</li>)}
                  </ul>
                </div>
              )}
              {lesson.differentiation.utmaning && (
                <div style={{ background: "#FAF6FC", border: "1px solid #DBC9E5", borderRadius: "var(--radius-md)", padding: "10px 12px" }}>
                  <div style={{ fontSize: 11, fontWeight: 600, color: "#6B3E8E", marginBottom: 5 }}>
                    ⚡ {t.differentiationUtmaning}
                  </div>
                  <ul style={{ fontSize: 13, lineHeight: 1.55, listStyle: "none", display: "flex", flexDirection: "column", gap: 4 }}>
                    {lesson.differentiation.utmaning.map((s, i) => <li key={i}>· {s}</li>)}
                  </ul>
                </div>
              )}
            </div>
          </Section>
        )}

        {/* Extra activities */}
        {lesson.extraActivities && lesson.extraActivities.length > 0 && (
          <Section icon="plus" label={t.extraActivitiesTitle}>
            <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
              {lesson.extraActivities.map((act, i) => (
                <div key={i} style={{ borderLeft: "2px solid var(--border-default)", paddingLeft: 10 }}>
                  <div style={{ fontSize: 13, fontWeight: 600, marginBottom: 2 }}>{act.title}</div>
                  <p style={{ fontSize: 13, lineHeight: 1.55, color: "var(--text-secondary)" }}>{act.description}</p>
                  {act.answer && <p style={{ fontSize: 12, color: "var(--success-text)", marginTop: 2 }}>✓ {act.answer}</p>}
                </div>
              ))}
            </div>
          </Section>
        )}

        {/* Extra time tiers */}
        {lesson.extraTime && lesson.extraTime.length > 0 && (
          <details style={{ background: "var(--bg-secondary)", border: "1px solid var(--border-subtle)", borderRadius: "var(--radius-md)", padding: "10px 14px" }}>
            <summary style={{ display: "flex", alignItems: "center", justifyContent: "space-between", cursor: "pointer", listStyle: "none" }}>
              <div>
                <div style={{ fontSize: 13, fontWeight: 600, marginBottom: 2 }}>+ {t.extraTimeTitle}</div>
                <div style={{ fontSize: 11, color: "var(--text-tertiary)" }}>{t.extraTimeDesc}</div>
              </div>
              <Icon name="chevronRight" size={14} style={{ color: "var(--text-tertiary)" }} />
            </summary>
            <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(180px, 1fr))", gap: 8, marginTop: 12 }}>
              {[...lesson.extraTime].sort((a, b) => a.minutes - b.minutes).map((tier, i) => (
                <div key={i} style={{ background: "var(--bg-surface)", border: "1px solid var(--border-default)", borderRadius: "var(--radius-md)", padding: "10px 12px" }}>
                  <div style={{ fontSize: 11, fontWeight: 600, color: "var(--accent)", marginBottom: 4 }}>+{tier.minutes} min</div>
                  <div style={{ fontSize: 13, fontWeight: 600, marginBottom: 4 }}>{tier.title}</div>
                  <p style={{ fontSize: 12, lineHeight: 1.5, marginBottom: 6 }}>{tier.description}</p>
                  <p style={{ fontSize: 11, color: "var(--text-tertiary)", fontStyle: "italic", lineHeight: 1.4 }}>↳ {tier.linkBack}</p>
                </div>
              ))}
            </div>
          </details>
        )}

        {/* Common pitfalls */}
        {lesson.commonPitfalls && lesson.commonPitfalls.length > 0 && (
          <Section icon="alert" label={t.commonPitfalls}>
            <ul style={{ fontSize: 13, lineHeight: 1.6, listStyle: "none", display: "flex", flexDirection: "column", gap: 5 }}>
              {lesson.commonPitfalls.map((p, i) => <li key={i} style={{ display: "flex", gap: 6 }}><span style={{ color: "var(--warning-text)" }}>⚠</span><span>{p}</span></li>)}
            </ul>
          </Section>
        )}

        {/* Classroom management */}
        {lesson.classroomManagement && lesson.classroomManagement.length > 0 && (
          <Section icon="users" label={t.classroomManagement}>
            <ul style={{ fontSize: 13, lineHeight: 1.6, listStyle: "none", display: "flex", flexDirection: "column", gap: 5 }}>
              {lesson.classroomManagement.map((p, i) => <li key={i} style={{ display: "flex", gap: 6 }}><span style={{ color: "var(--text-tertiary)" }}>·</span><span>{p}</span></li>)}
            </ul>
          </Section>
        )}

        {/* Teacher / vikarie notes */}
        {(lesson.teacherNotes || lesson.vikarieNotes) && (lesson.teacherNotes || lesson.vikarieNotes).length > 0 && (
          <div style={{ background: "var(--warning-bg)", border: "1px solid var(--warning-border)", borderRadius: "var(--radius-md)", padding: "12px 14px" }}>
            <div style={{ fontSize: 11, fontWeight: 600, color: "var(--warning-text)", textTransform: "uppercase", letterSpacing: "0.05em", marginBottom: 6 }}>
              💡 {lesson.isSub ? t.vikarieNotesTitle : t.teacherNotes}
            </div>
            <ul style={{ fontSize: 13, lineHeight: 1.55, color: "var(--warning-text)", listStyle: "none", display: "flex", flexDirection: "column", gap: 4 }}>
              {(lesson.teacherNotes || lesson.vikarieNotes).map((n, i) => <li key={i} style={{ display: "flex", gap: 6 }}><span>·</span><span>{n}</span></li>)}
            </ul>
          </div>
        )}

        {/* Homework */}
        {lesson.homework && lesson.homework !== "Ingen läxa" && lesson.homework !== "No homework" && (
          <Section icon="file" label={t.homework}>
            <p style={{ fontSize: 13, lineHeight: 1.6 }}>{lesson.homework}</p>
          </Section>
        )}

        {/* Assessment */}
        {lesson.assessment && (
          <Section icon="check" label={t.assessment}>
            <p style={{ fontSize: 13, lineHeight: 1.6 }}>{lesson.assessment}</p>
          </Section>
        )}

        {/* Sub tip */}
        {lesson.subTip && (
          <div style={{ background: "var(--warning-bg)", border: "2px solid var(--warning-border)", borderRadius: "var(--radius-md)", padding: "12px 14px" }}>
            <div style={{ fontSize: 11, fontWeight: 600, color: "var(--warning-text)", textTransform: "uppercase", letterSpacing: "0.05em", marginBottom: 4 }}>
              ⭐ {t.subTip}
            </div>
            <p style={{ fontSize: 13, color: "var(--warning-text)", lineHeight: 1.5, fontWeight: 500 }}>{lesson.subTip}</p>
          </div>
        )}
      </div>

      {isOption && (
        <div style={{ marginTop: 16, paddingTop: 14, borderTop: "1px solid var(--border-subtle)", display: "flex", justifyContent: "flex-end" }}>
          <Button variant="primary" icon={<Icon name="check" size={14} />} onClick={onPick}>{t.chooseAccept}</Button>
        </div>
      )}
    </div>
  );
}

function Section({ icon, label, children }) {
  return (
    <div>
      <div style={{ display: "flex", alignItems: "center", gap: 6, marginBottom: 6 }}>
        <Icon name={icon} size={13} style={{ color: "var(--text-tertiary)" }} />
        <span style={{ fontSize: 11, fontWeight: 600, color: "var(--text-tertiary)", textTransform: "uppercase", letterSpacing: "0.05em" }}>{label}</span>
      </div>
      {children}
    </div>
  );
}

// ============================================================
// MAIN APP
// ============================================================
const STORAGE_KEY = "lektionsplaneraren-v1";

function App() {
  const [config, setConfig] = useState({
    provider: "gemini",
    geminiKey: "",
    geminiModel: "gemini-2.5-flash",
    anthropicKey: "",
    anthropicModel: "claude-sonnet-4-5-20250929",
    localUrl: "http://localhost:1234",
    localKey: "",
    localModel: "local-model",
    language: "sv",
  });
  const [showSettings, setShowSettings] = useState(false);
  const [showLibrary, setShowLibrary] = useState(false);
  const [stage, setStage] = useState("");
  const [grade, setGrade] = useState("");
  const [subject, setSubject] = useState("");
  const [topic, setTopic] = useState("");
  const [duration, setDuration] = useState(60);
  const [pending, setPending] = useState(null);
  const [acceptedLesson, setAcceptedLesson] = useState(null);
  const [subLesson, setSubLesson] = useState(null);
  const [loadingChoices, setLoadingChoices] = useState(false);
  const [loadingSub, setLoadingSub] = useState(false);
  const [topicSuggestions, setTopicSuggestions] = useState([]);
  const [loadingTopics, setLoadingTopics] = useState(false);
  const [error, setError] = useState("");

  const t = LANG[config.language] || LANG.sv;

  useEffect(() => {
    try {
      const saved = JSON.parse(localStorage.getItem(STORAGE_KEY) || "{}");
      if (saved && typeof saved === "object") setConfig((c) => ({ ...c, ...saved }));
    } catch {}
  }, []);

  const saveConfig = (next) => {
    setConfig(next);
    try { localStorage.setItem(STORAGE_KEY, JSON.stringify(next)); } catch {}
  };

  useEffect(() => { setGrade(""); setSubject(""); setTopicSuggestions([]); }, [stage]);
  useEffect(() => { setTopicSuggestions([]); }, [grade, subject]);

  const hasKey = useMemo(() => {
    if (config.provider === "gemini") return !!config.geminiKey;
    if (config.provider === "anthropic") return !!config.anthropicKey;
    if (config.provider === "local") return !!config.localUrl;
    return false;
  }, [config]);

  const grades = stage ? STAGES[stage] : [];
  const subjects = stage ? SUBJECTS_BY_STAGE[stage] : [];
  const canGenerate = stage && grade && subject && topic.trim() && hasKey;

  const canSuggestTopics = stage && grade && subject && hasKey;

  const suggestTopics = async (append = false) => {
    if (!canSuggestTopics) return;
    setError(""); setLoadingTopics(true);
    try {
      const result = await runLLM(config,
        topicSuggestionsPrompt({
          stage, grade, subject, language: config.language,
          exclude: append ? topicSuggestions : [],
        })
      );
      const next = Array.isArray(result?.topics) ? result.topics : [];
      setTopicSuggestions(append ? [...topicSuggestions, ...next] : next);
    } catch (e) {
      setError(`${t.error}: ${e.message}`);
    } finally {
      setLoadingTopics(false);
    }
  };

  const generateChoices = async () => {
    if (!canGenerate) return;
    setError(""); setLoadingChoices(true); setPending(null); setAcceptedLesson(null); setSubLesson(null);
    try {
      const num = Math.floor(Math.random() * 4) + 2; // 2-5
      const prompts = Array.from({ length: num }, (_, i) =>
        lessonPrompt({ stage, grade, subject, topic, duration, branchIndex: i, totalBranches: num, language: config.language })
      );
      const results = await Promise.all(prompts.map((p) => runLLM(config, p)));
      setPending({ options: results.map((r, i) => ({ ...r, _id: `opt-${Date.now()}-${i}` })) });
    } catch (e) {
      setError(`${t.error}: ${e.message}`);
      console.error(e);
    } finally {
      setLoadingChoices(false);
    }
  };

  const acceptLesson = (opt) => {
    const v = lessonLibrary.add({
      stage, grade, subject, topic, duration,
      lesson: opt,
    });
    setAcceptedLesson({ ...opt, id: opt._id, isSub: false, version: v });
    setPending(null);
    setSubLesson(null);
  };

  // Load a previously saved version without re-saving. Sets up the form
  // so further "Generate" calls continue versioning the same group.
  const loadLessonFromLibrary = ({ entry, ver }) => {
    setStage(entry.stage);
    setGrade(entry.grade);
    setSubject(entry.subject);
    setTopic(entry.topic);
    if (entry.duration) setDuration(entry.duration);
    setAcceptedLesson({ ...ver.lesson, id: `loaded-${Date.now()}`, isSub: false, version: ver.v });
    setPending(null);
    setSubLesson(null);
    setShowLibrary(false);
  };

  const generateSub = async () => {
    if (!acceptedLesson || !hasKey) return;
    setError(""); setLoadingSub(true);
    try {
      const result = await runLLM(config,
        subPrompt({ stage, grade, subject, topic, duration, baseLesson: acceptedLesson, language: config.language })
      );
      setSubLesson({ ...result, id: `sub-${Date.now()}`, isSub: true });
    } catch (e) {
      setError(`${t.error}: ${e.message}`);
    } finally {
      setLoadingSub(false);
    }
  };

  const reset = () => {
    setPending(null);
    setAcceptedLesson(null);
    setSubLesson(null);
    setError("");
  };

  const exportMd = () => {
    const lessons = [acceptedLesson, subLesson].filter(Boolean);
    const lines = [
      `# Lektionsplanering`, ``,
      `**Stadium:** ${stage}  `,
      `**Årskurs:** ${grade}  `,
      `**Ämne:** ${subject}  `,
      `**Tema:** ${topic}  `,
      `**Lektionslängd:** ${duration} min  `,
      ``, `---`, ``,
    ];
    lessons.forEach((l) => {
      lines.push(`## ${l.title}${l.isSub ? " 🟡 (Vikarielektion)" : ""}`);
      lines.push(`*${l.approach}*`, ``);
      if (l.summary) lines.push(`${l.summary}`, ``);
      if (l.learningGoal || l.objective) lines.push(`**Lärandemål:** ${l.learningGoal || l.objective}`);
      if (l.lgr22_connection) lines.push(`**Läroplanskoppling:** ${l.lgr22_connection}`);
      lines.push(``);

      if (l.materialsNeeded || l.materials) {
        lines.push(`### Material`);
        (l.materialsNeeded || l.materials || []).forEach((m) => lines.push(`- ${m}`));
        lines.push(``);
      }

      if (l.phases && l.phases.length) {
        lines.push(`### Lektionsförlopp`);
        l.phases.forEach((p, i) => {
          lines.push(`#### ${i + 1}. ${p.name} (${p.minutes} min)`);
          if (p.teacherDoes && p.teacherDoes.length) {
            lines.push(`**Läraren / vikarien:**`);
            p.teacherDoes.forEach((s) => lines.push(`- ${s}`));
          }
          if (p.studentsDo && p.studentsDo.length) {
            lines.push(`**Eleverna:**`);
            p.studentsDo.forEach((s) => lines.push(`- ${s}`));
          }
          lines.push(``);
        });
      } else if (l.activities) {
        lines.push(`### Lektionsmoment`);
        l.activities.forEach((a) => lines.push(`- ${a}`));
        lines.push(``);
      }

      if (l.exitExercise) {
        lines.push(`### Avslutningsövning (${l.exitExercise.durationMinutes} min)`);
        lines.push(`**${l.exitExercise.title}**`);
        lines.push(l.exitExercise.description, ``);
      }

      if (l.differentiation && typeof l.differentiation === "object") {
        lines.push(`### Anpassning`);
        if (l.differentiation.stod) {
          lines.push(`**Stöd:**`);
          l.differentiation.stod.forEach((s) => lines.push(`- ${s}`));
        }
        if (l.differentiation.utmaning) {
          lines.push(`**Utmaning:**`);
          l.differentiation.utmaning.forEach((s) => lines.push(`- ${s}`));
        }
        lines.push(``);
      } else if (typeof l.differentiation === "string") {
        lines.push(`**Anpassning:** ${l.differentiation}`, ``);
      }

      if (l.extraActivities && l.extraActivities.length) {
        lines.push(`### Extra för snabba elever`);
        l.extraActivities.forEach((a) => lines.push(`- **${a.title}** — ${a.description}`));
        lines.push(``);
      }

      if (l.extraTime && l.extraTime.length) {
        lines.push(`### Om tid blir över`);
        l.extraTime.sort((a,b) => a.minutes - b.minutes).forEach((tier) => {
          lines.push(`- **+${tier.minutes} min · ${tier.title}** — ${tier.description} (${tier.linkBack})`);
        });
        lines.push(``);
      }

      if (l.vikarieNotes && l.vikarieNotes.length) {
        lines.push(`### Tips till vikarien`);
        l.vikarieNotes.forEach((n) => lines.push(`- ${n}`));
        lines.push(``);
      }

      if (l.assessment) lines.push(`**Bedömning:** ${l.assessment}`);
      if (l.subTip) lines.push(`**Tips:** ${l.subTip}`);
      lines.push(``, `---`, ``);
    });
    const blob = new Blob([lines.join("\n")], { type: "text/markdown" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = `lektion-${subject}-${grade}.md`.replace(/\s+/g, "-").replace(/\//g, "-");
    a.click();
    URL.revokeObjectURL(url);
  };

  return (
    <div style={{ minHeight: "100vh" }}>
      {showSettings && <SettingsModal config={config} onSave={saveConfig} onClose={() => setShowSettings(false)} t={t} />}
      {showLibrary && <LibraryModal onClose={() => setShowLibrary(false)} onLoad={loadLessonFromLibrary} t={t} />}

      <div style={{ maxWidth: 880, margin: "0 auto", padding: "32px 20px 80px" }}>
        {/* HEADER */}
        <header className="no-print" style={{ marginBottom: 24, display: "flex", alignItems: "flex-start", justifyContent: "space-between", gap: 16, flexWrap: "wrap" }}>
          <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
            <div style={{ width: 38, height: 38, background: "var(--accent)", borderRadius: "var(--radius-md)", display: "flex", alignItems: "center", justifyContent: "center", color: "#fff" }}>
              <Icon name="book" size={20} />
            </div>
            <div>
              <h1 style={{ fontSize: 22, fontWeight: 600, lineHeight: 1.2 }}>{t.title}</h1>
              <p style={{ fontSize: 13, color: "var(--text-secondary)", marginTop: 2 }}>{t.subtitle}</p>
            </div>
          </div>
          <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
            <div style={{ fontSize: 12, color: "var(--text-tertiary)", display: "flex", alignItems: "center", gap: 6 }}>
              <Icon name="key" size={12} />
              <span>{config.provider === "gemini" ? "Gemini" : config.provider === "anthropic" ? "Anthropic" : "Lokal"}</span>
              {!hasKey && <span style={{ width: 6, height: 6, borderRadius: "50%", background: "#E8C547" }} />}
              {hasKey && <span style={{ width: 6, height: 6, borderRadius: "50%", background: "var(--success-text)" }} />}
            </div>
            <Button variant="secondary" icon={<Icon name="settings" size={14} />} onClick={() => setShowSettings(true)}>
              {t.apiSettings}
            </Button>
            <Button variant="secondary" onClick={() => setShowLibrary(true)} title={t.savedLessons}>
              {t.savedLessons} <SavedCountInline />
            </Button>
          </div>
        </header>

        {/* API KEY WARNING */}
        {!hasKey && (
          <div className="no-print" style={{ background: "var(--warning-bg)", border: "1px solid var(--warning-border)", borderRadius: "var(--radius-md)", padding: "14px 18px", marginBottom: 20, display: "flex", alignItems: "flex-start", gap: 12 }}>
            <div style={{ color: "var(--warning-text)", flexShrink: 0, marginTop: 2 }}>
              <Icon name="alert" size={18} />
            </div>
            <div style={{ flex: 1, minWidth: 0 }}>
              <div style={{ fontSize: 13, fontWeight: 600, color: "var(--warning-text)", marginBottom: 2 }}>{t.apiKeyMissing}</div>
              <div style={{ fontSize: 12, color: "var(--warning-text)" }}>{t.apiKeyMissingDesc}</div>
            </div>
            <Button variant="primary" onClick={() => setShowSettings(true)}>{t.openSettings}</Button>
          </div>
        )}

        {/* INPUT FORM */}
        <div className="no-print" style={{ background: "var(--bg-surface)", border: "1px solid var(--border-subtle)", borderRadius: "var(--radius-lg)", padding: 24, marginBottom: 16 }}>
          <h2 style={{ fontSize: 14, fontWeight: 600, color: "var(--text-primary)", marginBottom: 16, display: "flex", alignItems: "center", gap: 6 }}>
            <Icon name="file" size={14} />
            {t.lessonDetails}
          </h2>
          <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(200px, 1fr))", gap: 14 }}>
            <Field label={t.stage}>
              <Select value={stage} onChange={(e) => setStage(e.target.value)}>
                <option value="">{t.chooseStage}</option>
                {Object.keys(STAGES).map((s) => <option key={s} value={s}>{s}</option>)}
              </Select>
            </Field>
            <Field label={t.grade}>
              <Select value={grade} onChange={(e) => setGrade(e.target.value)} disabled={!stage}>
                <option value="">{stage ? t.chooseGrade : t.chooseStageFirst}</option>
                {grades.map((g) => <option key={g} value={g}>{g}</option>)}
              </Select>
            </Field>
            <Field label={t.subject}>
              <Select value={subject} onChange={(e) => setSubject(e.target.value)} disabled={!stage}>
                <option value="">{stage ? t.chooseSubject : t.chooseStageFirst}</option>
                {subjects.map((s) => <option key={s} value={s}>{s}</option>)}
              </Select>
            </Field>
            <Field label={t.duration}>
              <Select value={duration} onChange={(e) => setDuration(Number(e.target.value))}>
                {[30, 40, 45, 60, 80, 90, 120].map((d) => <option key={d} value={d}>{d} min</option>)}
              </Select>
            </Field>
          </div>
          <div style={{ marginTop: 14 }}>
            <Field label={t.topic}>
              <Input value={topic} onChange={(e) => setTopic(e.target.value)} placeholder={t.topicPlaceholder} />
            </Field>

            {canSuggestTopics && (
              <div style={{ marginTop: 10 }}>
                <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 8, gap: 8, flexWrap: "wrap" }}>
                  <span style={{ fontSize: 11, fontWeight: 600, color: "var(--text-tertiary)", textTransform: "uppercase", letterSpacing: "0.05em" }}>
                    {t.topicSuggestions}
                  </span>
                  {topicSuggestions.length === 0 ? (
                    <button onClick={() => suggestTopics(false)} disabled={loadingTopics} style={{
                      display: "inline-flex", alignItems: "center", gap: 5,
                      padding: "5px 10px", fontSize: 12, fontWeight: 500,
                      background: "transparent", color: "var(--accent)",
                      border: "1px solid var(--border-default)", borderRadius: "var(--radius-sm)",
                      cursor: loadingTopics ? "wait" : "pointer",
                    }}>
                      <Icon name={loadingTopics ? "refresh" : "sparkles"} size={12} style={loadingTopics ? { animation: "spin 0.8s linear infinite" } : {}} />
                      {loadingTopics ? t.suggestingTopics : t.suggestTopics}
                    </button>
                  ) : (
                    <button onClick={() => suggestTopics(true)} disabled={loadingTopics} style={{
                      display: "inline-flex", alignItems: "center", gap: 5,
                      padding: "5px 10px", fontSize: 12, fontWeight: 500,
                      background: "transparent", color: "var(--text-secondary)",
                      border: "1px solid var(--border-default)", borderRadius: "var(--radius-sm)",
                      cursor: loadingTopics ? "wait" : "pointer",
                    }}>
                      <Icon name={loadingTopics ? "refresh" : "plus"} size={12} style={loadingTopics ? { animation: "spin 0.8s linear infinite" } : {}} />
                      {loadingTopics ? t.suggestingTopics : t.moreSuggestions}
                    </button>
                  )}
                </div>

                {topicSuggestions.length > 0 && (
                  <div style={{ display: "flex", flexWrap: "wrap", gap: 6 }}>
                    {topicSuggestions.map((s, i) => {
                      const selected = topic === s;
                      return (
                        <button key={i} onClick={() => setTopic(s)} style={{
                          padding: "6px 12px", fontSize: 12, fontWeight: 500,
                          background: selected ? "var(--accent)" : "var(--bg-surface)",
                          color: selected ? "#fff" : "var(--text-primary)",
                          border: `1px solid ${selected ? "var(--accent)" : "var(--border-default)"}`,
                          borderRadius: 999,
                          cursor: "pointer", transition: "all 0.12s",
                        }}>{s}</button>
                      );
                    })}
                  </div>
                )}
              </div>
            )}
          </div>

          <div style={{ marginTop: 18, display: "flex", justifyContent: "flex-end", gap: 8 }}>
            {(acceptedLesson || pending) && (
              <Button variant="secondary" icon={<Icon name="refresh" size={14} />} onClick={reset}>{t.reset}</Button>
            )}
            <Button variant="primary" icon={loadingChoices ? <Icon name="refresh" size={14} style={{ animation: "spin 0.8s linear infinite" }} /> : <Icon name="sparkles" size={14} />}
              onClick={generateChoices} disabled={!canGenerate || loadingChoices}>
              {loadingChoices ? t.generating : t.generateChoices}
            </Button>
          </div>
        </div>

        {/* ERROR */}
        {error && (
          <div style={{ background: "var(--danger-bg)", border: "1px solid var(--danger-text)", borderRadius: "var(--radius-md)", padding: "12px 16px", marginBottom: 16, fontSize: 13, color: "var(--danger-text)", display: "flex", gap: 10 }}>
            <Icon name="alert" size={16} />
            <span>{error}</span>
          </div>
        )}

        {/* PENDING CHOICES */}
        {pending && (
          <div className="no-print" style={{ marginBottom: 16 }}>
            <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 12, gap: 12, flexWrap: "wrap" }}>
              <div>
                <h2 style={{ fontSize: 16, fontWeight: 600, marginBottom: 2 }}>{t.chooseLesson}</h2>
                <p style={{ fontSize: 13, color: "var(--text-secondary)" }}>{t.chooseLessonDesc}</p>
              </div>
              <Button variant="ghost" icon={<Icon name="x" size={14} />} onClick={() => setPending(null)}>{t.cancelChoices}</Button>
            </div>
            <div style={{ display: "flex", flexDirection: "column", gap: 12 }}>
              {pending.options.map((opt, idx) => (
                <LessonCard key={opt._id} lesson={opt} t={t} isOption optionLabel={`Alternativ ${String.fromCharCode(65 + idx)}`} onPick={() => acceptLesson(opt)} />
              ))}
            </div>
          </div>
        )}

        {/* ACCEPTED LESSON */}
        {acceptedLesson && (
          <div style={{ marginBottom: 16 }}>
            <div className="no-print" style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 12, gap: 8, flexWrap: "wrap" }}>
              <h2 style={{ fontSize: 16, fontWeight: 600 }}>{t.yourLesson}</h2>
              <div style={{ display: "flex", gap: 8 }}>
                <Button variant="ghost" icon={<Icon name="refresh" size={13} />} onClick={generateChoices}>{t.addAnother}</Button>
                <Button variant="ghost" icon={<Icon name="print" size={13} />} onClick={() => window.print()}>{t.print}</Button>
                <Button variant="ghost" icon={<Icon name="download" size={13} />} onClick={exportMd}>{t.download}</Button>
              </div>
            </div>
            <LessonCard lesson={acceptedLesson} t={t} version={acceptedLesson.version} />

            {!subLesson && (
              <div className="no-print" style={{ marginTop: 14, padding: 16, background: "var(--bg-secondary)", border: "1px dashed var(--border-default)", borderRadius: "var(--radius-md)", display: "flex", alignItems: "center", justifyContent: "space-between", gap: 12, flexWrap: "wrap" }}>
                <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
                  <div style={{ width: 32, height: 32, background: "#FFF8E1", border: "1px solid #E8C547", borderRadius: "var(--radius-md)", display: "flex", alignItems: "center", justifyContent: "center", color: "var(--warning-text)" }}>
                    <Icon name="coffee" size={16} />
                  </div>
                  <div>
                    <div style={{ fontSize: 13, fontWeight: 600 }}>{t.createSub}</div>
                    <div style={{ fontSize: 12, color: "var(--text-secondary)" }}>{t.subDesc}</div>
                  </div>
                </div>
                <Button variant="yellow" icon={loadingSub ? <Icon name="refresh" size={14} style={{ animation: "spin 0.8s linear infinite" }} /> : <Icon name="coffee" size={14} />} onClick={generateSub} disabled={loadingSub}>
                  {loadingSub ? t.creating : t.createSub}
                </Button>
              </div>
            )}
          </div>
        )}

        {/* SUB LESSON */}
        {subLesson && (
          <div style={{ marginBottom: 16 }}>
            <div className="no-print" style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 12, gap: 8, flexWrap: "wrap" }}>
              <h2 style={{ fontSize: 16, fontWeight: 600, display: "flex", alignItems: "center", gap: 6 }}>
                <Icon name="coffee" size={16} />
                {t.substituteLesson}
              </h2>
              <Button variant="ghost" icon={<Icon name="refresh" size={13} />} onClick={generateSub} disabled={loadingSub}>
                {loadingSub ? t.creating : t.addAnother}
              </Button>
            </div>
            <LessonCard lesson={subLesson} t={t} />
          </div>
        )}

        <div className="no-print" style={{ marginTop: 40, fontSize: 11, color: "var(--text-tertiary)", textAlign: "center", lineHeight: 1.6 }}>
          {t.print_warning}
        </div>
      </div>

      <AppVersionBadgeMount providerLabel={config.provider === "gemini" ? "Gemini" : config.provider === "anthropic" ? "Anthropic" : "Local"} onOpenLibrary={() => setShowLibrary(true)} />
    </div>
  );
}

function AppVersionBadgeMount({ providerLabel, onOpenLibrary }) {
  useLibraryVersion();
  const savedCount = lessonLibrary.getAll().reduce((sum, e) => sum + e.versions.length, 0);
  return <VersionBadge providerLabel={providerLabel} savedCount={savedCount} onOpenLibrary={onOpenLibrary} />;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
