async function callGemini({ apiKey, prompt, model }) {
  const url = `https://generativelanguage.googleapis.com/v1beta/models/${model || "gemini-2.0-flash"}:generateContent?key=${apiKey}`;
  const res = await fetch(url, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      contents: [{ parts: [{ text: prompt }] }],
      generationConfig: { temperature: 0.8, maxOutputTokens: 2048, responseMimeType: "application/json" },
    }),
  });
  if (!res.ok) throw new Error(`Gemini ${res.status}: ${await res.text()}`);
  const data = await res.json();
  const text = data?.candidates?.[0]?.content?.parts?.[0]?.text || "";
  return JSON.parse(text.replace(/```json|```/g, "").trim());
}

async function callAnthropic({ apiKey, prompt, model }) {
  const res = await fetch("https://api.anthropic.com/v1/messages", {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "x-api-key": apiKey,
      "anthropic-version": "2023-06-01",
      "anthropic-dangerous-direct-browser-access": "true",
    },
    body: JSON.stringify({
      model: model || "claude-sonnet-4-5-20250929",
      max_tokens: 2048,
      messages: [{ role: "user", content: prompt }],
    }),
  });
  if (!res.ok) throw new Error(`Anthropic ${res.status}: ${await res.text()}`);
  const data = await res.json();
  const text = data.content.filter((b) => b.type === "text").map((b) => b.text).join("");
  return JSON.parse(text.replace(/```json|```/g, "").trim());
}

async function callLocal({ baseUrl, apiKey, prompt, model }) {
  const url = `${baseUrl.replace(/\/$/, "")}/v1/chat/completions`;
  const res = await fetch(url, {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      ...(apiKey ? { Authorization: `Bearer ${apiKey}` } : {}),
    },
    body: JSON.stringify({
      model: model || "local-model",
      messages: [{ role: "user", content: prompt }],
      temperature: 0.8,
    }),
  });
  if (!res.ok) throw new Error(`Local ${res.status}: ${await res.text()}`);
  const data = await res.json();
  const text = data?.choices?.[0]?.message?.content || "";
  return JSON.parse(text.replace(/```json|```/g, "").trim());
}

async function runLLM(config, prompt) {
  if (config.provider === "gemini") return callGemini({ apiKey: config.geminiKey, prompt, model: config.geminiModel });
  if (config.provider === "anthropic") return callAnthropic({ apiKey: config.anthropicKey, prompt, model: config.anthropicModel });
  if (config.provider === "local") return callLocal({ baseUrl: config.localUrl, apiKey: config.localKey, prompt, model: config.localModel });
  throw new Error("No provider configured");
}

function Button({ variant = "secondary", icon, children, onClick, disabled, type = "button", style = {} }) {
  const variants = {
    primary: { background: "var(--accent)", color: "#fff", border: "1px solid var(--accent)" },
    primaryHover: { background: "var(--accent-hover)" },
    secondary: { background: "var(--bg-surface)", color: "var(--text-primary)", border: "1px solid var(--border-default)" },
    secondaryHover: { background: "var(--bg-secondary)", borderColor: "var(--border-strong)" },
    yellow: { background: "#F5C518", color: "#1A1A1A", border: "1px solid #C9A013" },
    yellowHover: { background: "#E8B814" },
    ghost: { background: "transparent", color: "var(--text-secondary)", border: "1px solid transparent" },
    ghostHover: { background: "var(--bg-secondary)", color: "var(--text-primary)" },
    danger: { background: "var(--bg-surface)", color: "var(--danger-text)", border: "1px solid var(--border-default)" },
    dangerHover: { background: "var(--danger-bg)", borderColor: "var(--danger-text)" },
  };
  const [hover, setHover] = useState(false);
  const base = variants[variant] || variants.secondary;
  const hoverStyles = !disabled && hover ? variants[variant + "Hover"] || {} : {};
  return (
    <button type={type} onClick={onClick} disabled={disabled}
      onMouseEnter={() => setHover(true)} onMouseLeave={() => setHover(false)}
      style={{
        display: "inline-flex", alignItems: "center", gap: 6,
        padding: "8px 14px", fontSize: 13, fontWeight: 500,
        borderRadius: "var(--radius-md)", transition: "all 0.12s",
        whiteSpace: "nowrap",
        ...base, ...hoverStyles, ...style,
      }}>
      {icon}
      {children}
    </button>
  );
}

function Field({ label, children, hint }) {
  return (
    <div>
      <label style={{ display: "block", fontSize: 12, fontWeight: 500, color: "var(--text-secondary)", marginBottom: 6 }}>{label}</label>
      {children}
      {hint && <div style={{ fontSize: 11, color: "var(--text-tertiary)", marginTop: 4 }}>{hint}</div>}
    </div>
  );
}

function Input(props) {
  return <input {...props} style={{
    width: "100%", padding: "8px 12px", fontSize: 14,
    border: "1px solid var(--border-default)", borderRadius: "var(--radius-md)",
    background: "var(--bg-surface)", color: "var(--text-primary)",
    transition: "border-color 0.12s", ...(props.style || {}),
  }} />;
}

const STORAGE_KEY = "lektionsplaneraren-v1";

function App() {
  const [config, setConfig] = useState({
    provider: "gemini",
    geminiKey: "",
    geminiModel: "gemini-2.0-flash",
    anthropicKey: "",
    anthropicModel: "claude-sonnet-4-5-20250929",
    localUrl: "http://localhost:1234",
    localKey: "",
    localModel: "local-model",
    language: "sv",
  });
  const [showSettings, setShowSettings] = useState(false);
  const [stage, setStage] = useState("");
  const [grade, setGrade] = useState("");
  const [subject, setSubject] = useState("");
  const [topic, setTopic] = useState("");
  const [duration, setDuration] = useState(60);
  const [pending, setPending] = useState(null);
  const [acceptedLesson, setAcceptedLesson] = useState(null);
  const [subLesson, setSubLesson] = useState(null);
  const [loadingChoices, setLoadingChoices] = useState(false);
  const [loadingSub, setLoadingSub] = useState(false);
  const [error, setError] = useState("");

  const t = LANG[config.language] || LANG.sv;

  useEffect(() => {
    try {
      const saved = JSON.parse(localStorage.getItem(STORAGE_KEY) || "{}");
      if (saved && typeof saved === "object") setConfig((c) => ({ ...c, ...saved }));
    } catch {}
  }, []);

  const saveConfig = (next) => {
    setConfig(next);
    try { localStorage.setItem(STORAGE_KEY, JSON.stringify(next)); } catch {}
  };

  useEffect(() => { setGrade(""); setSubject(""); }, [stage]);

  const hasKey = useMemo(() => {
    if (config.provider === "gemini") return !!config.geminiKey;
    if (config.provider === "anthropic") return !!config.anthropicKey;
    if (config.provider === "local") return !!config.localUrl;
    return false;
  }, [config]);

  const grades = stage ? STAGES[stage] : [];
  const subjects = stage ? SUBJECTS_BY_STAGE[stage] : [];
  const canGenerate = stage && grade && subject && topic.trim() && hasKey;

  const generateChoices = async () => {
    if (!canGenerate) return;
    setError(""); setLoadingChoices(true); setPending(null); setAcceptedLesson(null); setSubLesson(null);
    try {
      const num = Math.floor(Math.random() * 4) + 2; // 2-5
      const prompts = Array.from({ length: num }, (_, i) =>
        lessonPrompt({ stage, grade, subject, topic, duration, branchIndex: i, totalBranches: num, language: config.language })
      );
      const results = await Promise.all(prompts.map((p) => runLLM(config, p)));
      setPending({ options: results.map((r, i) => ({ ...r, _id: `opt-${Date.now()}-${i}` })) });
    } catch (e) {
      setError(`${t.error}: ${e.message}`);
      console.error(e);
    } finally {
      setLoadingChoices(false);
    }
  };

  const acceptLesson = (opt) => {
    setAcceptedLesson({ ...opt, id: opt._id, isSub: false });
    setPending(null);
    setSubLesson(null);
  };

  const generateSub = async () => {
    if (!acceptedLesson || !hasKey) return;
    setError(""); setLoadingSub(true);
    try {
      const result = await runLLM(config,
        subPrompt({ stage, grade, subject, topic, duration, baseLesson: acceptedLesson, language: config.language })
      );
      setSubLesson({ ...result, id: `sub-${Date.now()}`, isSub: true });
    } catch (e) {
      setError(`${t.error}: ${e.message}`);
    } finally {
      setLoadingSub(false);
    }
  };

  const reset = () => {
    setPending(null);
    setAcceptedLesson(null);
    setSubLesson(null);
    setError("");
  };

  const exportMd = () => {
    const lessons = [acceptedLesson, subLesson].filter(Boolean);
    const lines = [
      `# Lektionsplanering`, ``,
      `**Stadium:** ${stage}  `,
      `**Årskurs:** ${grade}  `,
      `**Ämne:** ${subject}  `,
      `**Tema:** ${topic}  `,
      `**Lektionslängd:** ${duration} min  `,
      ``, `---`, ``,
    ];
    lessons.forEach((l) => {
      lines.push(`## ${l.title}${l.isSub ? " 🟡 (Vikarielektion)" : ""}`);
      lines.push(`*${l.approach} · ${l.duration}*`, ``);
      if (l.lgr22_connection) lines.push(`**Läroplanskoppling:** ${l.lgr22_connection}`);
      lines.push(`**Lärandemål:** ${l.objective}`);
      lines.push(`**Sammanfattning:** ${l.summary}`, ``);
      lines.push(`**Lektionsmoment:**`);
      l.activities.forEach((a) => lines.push(`- ${a}`));
      lines.push(``, `**Material:**`);
      l.materials.forEach((m) => lines.push(`- ${m}`));
      lines.push(``);
      if (l.differentiation) lines.push(`**Anpassning:** ${l.differentiation}`);
      lines.push(`**Bedömning:** ${l.assessment}`);
      if (l.subTip) lines.push(`**Tips till vikarien:** ${l.subTip}`);
      lines.push(``, `---`, ``);
    });
    const blob = new Blob([lines.join("\n")], { type: "text/markdown" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = `lektion-${subject}-${grade}.md`.replace(/\s+/g, "-").replace(/\//g, "-");
    a.click();
    URL.revokeObjectURL(url);
  };

  return (
    <div style={{ minHeight: "100vh" }}>
      {showSettings && <SettingsModal config={config} onSave={saveConfig} onClose={() => setShowSettings(false)} t={t} />}

      <div style={{ maxWidth: 880, margin: "0 auto", padding: "32px 20px 80px" }}>
        {/* HEADER */}
        <header className="no-print" style={{ marginBottom: 24, display: "flex", alignItems: "flex-start", justifyContent: "space-between", gap: 16, flexWrap: "wrap" }}>
          <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
            <div style={{ width: 38, height: 38, background: "var(--accent)", borderRadius: "var(--radius-md)", display: "flex", alignItems: "center", justifyContent: "center", color: "#fff" }}>
              <Icon name="book" size={20} />
            </div>
            <div>
              <h1 style={{ fontSize: 22, fontWeight: 600, lineHeight: 1.2 }}>{t.title}</h1>
              <p style={{ fontSize: 13, color: "var(--text-secondary)", marginTop: 2 }}>{t.subtitle}</p>
            </div>
          </div>
          <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
            <div style={{ fontSize: 12, color: "var(--text-tertiary)", display: "flex", alignItems: "center", gap: 6 }}>
              <Icon name="key" size={12} />
              <span>{config.provider === "gemini" ? "Gemini" : config.provider === "anthropic" ? "Anthropic" : "Lokal"}</span>
              {!hasKey && <span style={{ width: 6, height: 6, borderRadius: "50%", background: "#E8C547" }} />}
              {hasKey && <span style={{ width: 6, height: 6, borderRadius: "50%", background: "var(--success-text)" }} />}
            </div>
            <Button variant="secondary" icon={<Icon name="settings" size={14} />} onClick={() => setShowSettings(true)}>
              {t.apiSettings}
            </Button>
          </div>
        </header>

        {/* API KEY WARNING */}
        {!hasKey && (
          <div className="no-print" style={{ background: "var(--warning-bg)", border: "1px solid var(--warning-border)", borderRadius: "var(--radius-md)", padding: "14px 18px", marginBottom: 20, display: "flex", alignItems: "flex-start", gap: 12 }}>
            <div style={{ color: "var(--warning-text)", flexShrink: 0, marginTop: 2 }}>
              <Icon name="alert" size={18} />
            </div>
            <div style={{ flex: 1, minWidth: 0 }}>
              <div style={{ fontSize: 13, fontWeight: 600, color: "var(--warning-text)", marginBottom: 2 }}>{t.apiKeyMissing}</div>
              <div style={{ fontSize: 12, color: "var(--warning-text)" }}>{t.apiKeyMissingDesc}</div>
            </div>
            <Button variant="primary" onClick={() => setShowSettings(true)}>{t.openSettings}</Button>
          </div>
        )}

        {/* INPUT FORM */}
        <div className="no-print" style={{ background: "var(--bg-surface)", border: "1px solid var(--border-subtle)", borderRadius: "var(--radius-lg)", padding: 24, marginBottom: 16 }}>
          <h2 style={{ fontSize: 14, fontWeight: 600, color: "var(--text-primary)", marginBottom: 16, display: "flex", alignItems: "center", gap: 6 }}>
            <Icon name="file" size={14} />
            {t.lessonDetails}
          </h2>
          <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(200px, 1fr))", gap: 14 }}>
            <Field label={t.stage}>
              <Select value={stage} onChange={(e) => setStage(e.target.value)}>
                <option value="">{t.chooseStage}</option>
                {Object.keys(STAGES).map((s) => <option key={s} value={s}>{s}</option>)}
              </Select>
            </Field>
            <Field label={t.grade}>
              <Select value={grade} onChange={(e) => setGrade(e.target.value)} disabled={!stage}>
                <option value="">{stage ? t.chooseGrade : t.chooseStageFirst}</option>
                {grades.map((g) => <option key={g} value={g}>{g}</option>)}
              </Select>
            </Field>
            <Field label={t.subject}>
              <Select value={subject} onChange={(e) => setSubject(e.target.value)} disabled={!stage}>
                <option value="">{stage ? t.chooseSubject : t.chooseStageFirst}</option>
                {subjects.map((s) => <option key={s} value={s}>{s}</option>)}
              </Select>
            </Field>
            <Field label={t.duration}>
              <Select value={duration} onChange={(e) => setDuration(Number(e.target.value))}>
                {[30, 40, 45, 60, 80, 90, 120].map((d) => <option key={d} value={d}>{d} min</option>)}
              </Select>
            </Field>
          </div>
          <div style={{ marginTop: 14 }}>
            <Field label={t.topic}>
              <Input value={topic} onChange={(e) => setTopic(e.target.value)} placeholder={t.topicPlaceholder} />
            </Field>
          </div>

          <div style={{ marginTop: 18, display: "flex", justifyContent: "flex-end", gap: 8 }}>
            {(acceptedLesson || pending) && (
              <Button variant="secondary" icon={<Icon name="refresh" size={14} />} onClick={reset}>{t.reset}</Button>
            )}
            <Button variant="primary" icon={loadingChoices ? <Icon name="refresh" size={14} style={{ animation: "spin 0.8s linear infinite" }} /> : <Icon name="sparkles" size={14} />}
              onClick={generateChoices} disabled={!canGenerate || loadingChoices}>
              {loadingChoices ? t.generating : t.generateChoices}
            </Button>
          </div>
        </div>

        {/* ERROR */}
        {error && (
          <div style={{ background: "var(--danger-bg)", border: "1px solid var(--danger-text)", borderRadius: "var(--radius-md)", padding: "12px 16px", marginBottom: 16, fontSize: 13, color: "var(--danger-text)", display: "flex", gap: 10 }}>
            <Icon name="alert" size={16} />
            <span>{error}</span>
          </div>
        )}

        {/* PENDING CHOICES */}
        {pending && (
          <div className="no-print" style={{ marginBottom: 16 }}>
            <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 12, gap: 12, flexWrap: "wrap" }}>
              <div>
                <h2 style={{ fontSize: 16, fontWeight: 600, marginBottom: 2 }}>{t.chooseLesson}</h2>
                <p style={{ fontSize: 13, color: "var(--text-secondary)" }}>{t.chooseLessonDesc}</p>
              </div>
              <Button variant="ghost" icon={<Icon name="x" size={14} />} onClick={() => setPending(null)}>{t.cancelChoices}</Button>
            </div>
            <div style={{ display: "flex", flexDirection: "column", gap: 12 }}>
              {pending.options.map((opt, idx) => (
                <LessonCard key={opt._id} lesson={opt} t={t} isOption optionLabel={`Alternativ ${String.fromCharCode(65 + idx)}`} onPick={() => acceptLesson(opt)} />
              ))}
            </div>
          </div>
        )}

        {/* ACCEPTED LESSON */}
        {acceptedLesson && (
          <div style={{ marginBottom: 16 }}>
            <div className="no-print" style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 12, gap: 8, flexWrap: "wrap" }}>
              <h2 style={{ fontSize: 16, fontWeight: 600 }}>{t.yourLesson}</h2>
              <div style={{ display: "flex", gap: 8 }}>
                <Button variant="ghost" icon={<Icon name="refresh" size={13} />} onClick={generateChoices}>{t.addAnother}</Button>
                <Button variant="ghost" icon={<Icon name="print" size={13} />} onClick={() => window.print()}>{t.print}</Button>
                <Button variant="ghost" icon={<Icon name="download" size={13} />} onClick={exportMd}>{t.download}</Button>
              </div>
            </div>
            <LessonCard lesson={acceptedLesson} t={t} />

            {!subLesson && (
              <div className="no-print" style={{ marginTop: 14, padding: 16, background: "var(--bg-secondary)", border: "1px dashed var(--border-default)", borderRadius: "var(--radius-md)", display: "flex", alignItems: "center", justifyContent: "space-between", gap: 12, flexWrap: "wrap" }}>
                <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
                  <div style={{ width: 32, height: 32, background: "#FFF8E1", border: "1px solid #E8C547", borderRadius: "var(--radius-md)", display: "flex", alignItems: "center", justifyContent: "center", color: "var(--warning-text)" }}>
                    <Icon name="coffee" size={16} />
                  </div>
                  <div>
                    <div style={{ fontSize: 13, fontWeight: 600 }}>{t.createSub}</div>
                    <div style={{ fontSize: 12, color: "var(--text-secondary)" }}>{t.subDesc}</div>
                  </div>
                </div>
                <Button variant="yellow" icon={loadingSub ? <Icon name="refresh" size={14} style={{ animation: "spin 0.8s linear infinite" }} /> : <Icon name="coffee" size={14} />} onClick={generateSub} disabled={loadingSub}>
                  {loadingSub ? t.creating : t.createSub}
                </Button>
              </div>
            )}
          </div>
        )}

        {/* SUB LESSON */}
        {subLesson && (
          <div style={{ marginBottom: 16 }}>
            <div className="no-print" style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 12, gap: 8, flexWrap: "wrap" }}>
              <h2 style={{ fontSize: 16, fontWeight: 600, display: "flex", alignItems: "center", gap: 6 }}>
                <Icon name="coffee" size={16} />
                {t.substituteLesson}
              </h2>
              <Button variant="ghost" icon={<Icon name="refresh" size={13} />} onClick={generateSub} disabled={loadingSub}>
                {loadingSub ? t.creating : t.addAnother}
              </Button>
            </div>
            <LessonCard lesson={subLesson} t={t} />
          </div>
        )}

        <div className="no-print" style={{ marginTop: 40, fontSize: 11, color: "var(--text-tertiary)", textAlign: "center", lineHeight: 1.6 }}>
          {t.print_warning}
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
