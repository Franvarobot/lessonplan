<script src="https://cdn.jsdelivr.net/npm/@babel/standalone@7.25.6/babel.min.js"></script>

<script>
// Fix: Babel standalone injects helper vars like `_excluded` as `var` declarations
// at the top of each transpiled script. Since all text/babel scripts share the
// same window scope, the second script to use object rest spread crashes with
// "Identifier _excluded has already been declared". 
// Patch: wrap Babel.transform output in an IIFE so helpers stay scoped.
(function() {
  const _originalTransform = Babel.transform.bind(Babel);
  Babel.transform = function(code, options) {
    const result = _originalTransform(code, options);
    return {
      ...result,
      code: '(function() {\n' + result.code + '\n})();',
    };
  };
})();
</script>
