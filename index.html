<style>
  :root {
    --bg-page: #f5f5f3;
    --bg-surface: #ffffff;
    --bg-secondary: #f1efe8;
    --bg-info: #e6f1fb;
    --bg-success: #eaf3de;
    --bg-warning: #faeeda;
    --bg-danger: #fcebeb;
    --bg-modal-overlay: rgba(20, 20, 20, 0.45);

    --text-primary: #1f1f1d;
    --text-secondary: #5f5e5a;
    --text-tertiary: #888780;
    --text-info: #0c447c;
    --text-success: #27500a;
    --text-warning: #633806;
    --text-danger: #791f1f;

    --border-subtle: rgba(0,0,0,0.10);
    --border-default: rgba(0,0,0,0.18);
    --border-info: #185fa5;

    --font-mono: ui-monospace, "SF Mono", Menlo, Consolas, monospace;

  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    background: var(--bg-page);
    color: var(--text-primary);
    font-family: var(--font-sans);
    font-size: 14px;
    line-height: 1.55;
    -webkit-font-smoothing: antialiased;

  .sr-only {
    position: absolute; width: 1px; height: 1px; padding: 0;
    margin: -1px; overflow: hidden; clip: rect(0,0,0,0); border: 0;
  }

  button { font: inherit; cursor: pointer; }
  input, select, textarea {
    font: inherit; color: inherit;
    background: var(--bg-surface);
    border: 0.5px solid var(--border-default);
    border-radius: var(--radius-md);

  input:focus, select:focus, textarea:focus {
    outline: none;
    box-shadow: 0 0 0 2px rgba(24,95,165,0.25);
    border-color: var(--border-info);
  }
  textarea { resize: vertical; min-height: 36px; }

  /* Print: only the plan area when ?view=plan is open */
  @media print {
    .no-print { display: none !important; }
    body { background: white; }

  @keyframes lpspin { to { transform: rotate(360deg); } }

const MOCK_LESSONS = [
  { id: 'l1', time: '08:00 – 09:00', class: '6B', subject: 'NO',        subjectKey: 'no',        grade: 6, room: 'Labb',      teacher: 'H. Karlsson', length: 60 },
  { id: 'l2', time: '08:00 – 09:00', class: '7B', subject: 'Matematik', subjectKey: 'matematik', grade: 7, room: 'Västra 208', teacher: 'Å. Lund',      length: 60 },
  { id: 'l3', time: '10:00 – 11:00', class: '6B', subject: 'NO',        subjectKey: 'no',        grade: 6, room: 'NO-sal',    teacher: 'H. Karlsson', length: 60 },

// ============================================================
// Stub generator — canned content. Real version uses LLM.
// ============================================================
function stubGenerate({ subject, subjectKey, grade, language, durationMinutes, addOns, learningGoal }) {
  const isSv = language === 'sv';
  const isMath = subjectKey === 'matematik' || /MATMAT/.test(subjectKey);
  const isNO = subjectKey === 'no';
  if (isMath) return mathPlan(isSv, grade, durationMinutes, addOns, subjectKey);
  if (isNO) return sciencePlan(isSv, grade, durationMinutes, addOns);
  return genericPlan(isSv, subject, grade, durationMinutes, addOns, subjectKey, learningGoal);
}

function mathPlan(isSv, grade, dur, addOns, subjKey) {
  const total = dur || 60;
  const intro = Math.round(total * 0.16);
  const main = Math.round(total * 0.55);
  const wrap = total - intro - main - 5;
  const subjectLabel = subjKey?.startsWith('MAT') ? 'Matematik 1' + subjKey.slice(-1) : 'Matematik';
  return isSv ? {
    title: 'Bråk i vardagen',
    summary: `En ${total}-minuters lektion där eleverna utforskar bråk genom konkreta vardagsexempel.`,
    learningGoal: 'Jag kan förklara vad ett bråk är och visa exempel på bråk i min vardag.',
    curriculumLinks: {
      identifier: subjKey, nameSv: subjectLabel,
      centralInnehall: [
        'Tal i bråk- och decimalform och deras användning i vardagliga situationer.',
        'Strategier för matematisk problemlösning i vardagliga situationer.',
      ],
      kriterier: 'Eleverna ska kunna identifiera och förklara enkla bråk samt lösa problem som involverar bråk i vardagliga sammanhang.',
    },
    materialsNeeded: ['Whiteboard och pennor', 'Papper till varje elev', 'Färgade pennor (om möjligt)'],
    phases: [
      { title: 'Introduktion', durationMinutes: intro, description: 'Aktivera förkunskaper genom vardagsexempel.',
        teacherActions: ['Skriv "1/2" på tavlan och fråga: "Var har ni sett detta?"', 'Lyssna på 3-4 svar och skriv upp dem.', 'Säg: "Idag ska vi titta på bråk i vardagen."'],
        studentActions: ['Räcker upp handen och delar med sig av exempel.', 'Antecknar i sitt block.'] },
      { title: 'Huvudaktivitet — bråk i vardagen', durationMinutes: main, description: 'Eleverna arbetar i par och ritar 6 vardagsbråk.',
        teacherActions: ['Dela ut papper till varje par.', 'Säg: "Rita 6 bilder där ni kan se ett bråk. Skriv bråket bredvid."', 'Gå runt. Fråga par som fastnar: "Vad är hela här? Vad är delen?"'],
        studentActions: ['Diskuterar med sin partner.', 'Ritar 6 vardagsbilder med bråk (pizza, glas, m.m.).', 'Skriver bråket bredvid varje bild.'] },
      { title: 'Sammanfattning', durationMinutes: wrap, description: 'Par redovisar och bråk samlas på tavlan.',
        teacherActions: ['Be 4-5 par dela en bild var.', 'Skriv alla bråk på tavlan.', 'Fråga: "Vilket bråk är störst? Hur vet vi det?"'],
        studentActions: ['Visar sin bild och förklarar bråket.', 'Jämför olika bråk muntligt.'] },
    ],
    exitExercise: addOns?.exitExercise === false ? undefined : {
      title: 'Bråk-biljett ut', durationMinutes: 5,
      description: 'Varje elev skriver på en lapp: ett bråk de såg under lektionen + en plats där de tror de kommer se bråk imorgon. Lämna lappen vid dörren.',
    },
    extraActivities: addOns?.extraActivities ? [
      { title: 'Bråk-bingo', description: 'Rita 9 rutor med olika bråk och låt en partner kalla ut dem. Först med rad ropar bingo.' },
      { title: 'Bråk-jakt i klassrummet', description: 'Hitta 5 saker i klassrummet som kan delas i bråk. Skriv upp dem.' },
    ] : undefined,
    differentiation: addOns?.differentiation ? {
      stod: ['Erbjud konkret material (klossar/papperscirklar) till elever som behöver något att hålla i.', 'Börja med 1/2 och 1/4 innan andra bråk introduceras.', 'Para ihop med stark elev som modellerar tänkandet högt.'],
      utmaning: ['Be eleven jämföra två bråk med olika nämnare och förklara vilket som är störst.', 'Introducera blandade tal: 1 1/2 — var i vardagen syns det?', 'Be eleven hitta ett bråk som är större än 1/2 men mindre än 3/4.'],
    } : undefined,
    vikarieNotes: [
      'Om eleverna säger "jag har aldrig sett bråk" — ge ett exempel: "Hälften av en macka."',
      'Vanlig fallgrop: elever skriver bara siffror. Insistera på en bild först, bråket kommer naturligt.',
      'Det går bra om diskussionen blir livlig — det betyder att de tänker.',
    ],
  } : {
    title: 'Fractions in everyday life',
    summary: `A ${total}-minute lesson where students explore fractions through concrete everyday examples.`,
    learningGoal: 'I can explain what a fraction is and give examples of fractions in my everyday life.',
    curriculumLinks: {
      identifier: subjKey, nameSv: subjectLabel,
      centralInnehall: [
        'Numbers in fraction and decimal form and their use in everyday situations.',
        'Strategies for mathematical problem-solving in everyday situations.',
      ],
      kriterier: 'Students should identify and explain simple fractions, and solve problems involving fractions in everyday contexts.',
    },
    materialsNeeded: ['Whiteboard and markers', 'Paper for each student', 'Colored pencils if available'],
    phases: [
      { title: 'Introduction', durationMinutes: intro, description: 'Activate prior knowledge using everyday examples.',
        teacherActions: ['Write "1/2" on the board. Ask: "Where have you seen this?"', 'Listen to 3-4 answers, write them up.', 'Say: "Today we look at fractions in our daily lives."'],
        studentActions: ['Raise hands and share examples.', 'Take notes.'] },
      { title: 'Main activity — fractions around us', durationMinutes: main, description: 'Pairs draw 6 everyday fractions.',
        teacherActions: ['Hand out paper to each pair.', 'Say: "Draw 6 pictures where you can see a fraction. Write the fraction next to each."', 'Walk around. For stuck pairs: "What is the whole? What is the part?"'],
        studentActions: ['Discuss with partner.', 'Draw 6 everyday fraction images.', 'Write the fraction next to each image.'] },
      { title: 'Wrap-up', durationMinutes: wrap, description: 'Pairs share and fractions get collected on the board.',
        teacherActions: ['Ask 4-5 pairs to share one image each.', 'Write each fraction on the board.', 'Ask: "Which is biggest? How do we know?"'],
        studentActions: ['Show image and explain the fraction.', 'Compare fractions verbally.'] },
    ],
    exitExercise: addOns?.exitExercise === false ? undefined : {
      title: 'Fraction exit ticket', durationMinutes: 5,
      description: 'Each student writes on a slip: one fraction they saw today + one place they expect to see a fraction tomorrow. Drop at door on the way out.',
    },
    extraActivities: addOns?.extraActivities ? [
      { title: 'Fraction bingo', description: 'Draw 9 squares with different fractions. Partner calls them out. First row wins.' },
      { title: 'Classroom fraction hunt', description: 'Find 5 objects in the room that can be split into fractions. Write them down.' },
    ] : undefined,
    differentiation: addOns?.differentiation ? {
      stod: ['Offer manipulatives (blocks/paper circles) for students who need something to hold.', 'Start with 1/2 and 1/4 only.', 'Pair with a strong peer who models thinking aloud.'],
      utmaning: ['Compare two fractions with different denominators — which is bigger and why?', 'Introduce mixed numbers: 1 1/2 — where in daily life?', 'Find a fraction larger than 1/2 but smaller than 3/4.'],
    } : undefined,
    vikarieNotes: [
      'If a student says "I\'ve never seen a fraction" — give an example: "Half a sandwich."',
      'Common pitfall: students just write numbers. Insist on a drawing first.',
      'Lively discussion is a good sign — it means they\'re thinking.',
    ],
  };
}

function sciencePlan(isSv, grade, dur, addOns) {
  const total = dur || 60;
  return isSv ? {
    title: 'Vattnets kretslopp',
    summary: `En ${total}-minuters lektion där eleverna observerar och förklarar vattnets kretslopp.`,
    learningGoal: 'Jag kan förklara vattnets kretslopp och varför det är viktigt för livet på jorden.',
    curriculumLinks: {
      identifier: 'no', nameSv: 'Naturorienterande ämnen',
      centralInnehall: [
        'Vattnets olika former: fast, flytande och gas.',
        'Enkel partikelmodell för att beskriva och förklara materiens uppbyggnad och kretslopp.',
      ],
      kriterier: 'Eleven beskriver vattnets kretslopp med naturvetenskapliga begrepp och kopplar det till vardagsobservationer.',
    },
    materialsNeeded: ['Whiteboard', 'Genomskinlig plastpåse', 'Lite vatten', 'Tejp och en solig fönsterplats'],
    phases: [
      { title: 'Observation', durationMinutes: 10, description: 'Sätt upp ett mini-kretslopp som körs i bakgrunden.',
        teacherActions: ['Häll en skvätt vatten i plastpåsen, tejpa upp på fönstret.', 'Säg: "Titta hit då och då. Vi pratar om det senare."'],
        studentActions: ['Tittar på påsen.', 'Antecknar vad de ser.'] },
      { title: 'Genomgång', durationMinutes: 25, description: 'Rita kretsloppet på tavlan tillsammans.',
        teacherActions: ['Rita en sjö, en sol, ett moln, regn på tavlan.', 'Fråga: "Vad händer mellan sjön och molnet?"', 'Skriv in begreppen avdunstning, kondensation, nederbörd.'],
        studentActions: ['Föreslår vad som händer.', 'Ritar av i sitt block.'] },
      { title: 'Tillämpning', durationMinutes: total - 40, description: 'Para ihop och förklara påsen.',
        teacherActions: ['Be par titta på påsen igen.', 'Fråga: "Var i kretsloppet är påsen?"'],
        studentActions: ['Diskuterar i par.', 'Förklarar med begreppen.'] },
    ],
    exitExercise: addOns?.exitExercise === false ? undefined : {
      title: 'Tre ord ut', durationMinutes: 5,
      description: 'Varje elev säger högt ett av begreppen (avdunstning, kondensation, nederbörd) på vägen ut.',
    },
    differentiation: addOns?.differentiation ? {
      stod: ['Ge en färdig kretsloppsbild att fylla i begreppen på.', 'Använd egen mugg + vatten som exempel istället för påsen.'],
      utmaning: ['Be eleven förklara var saltvatten passar in.', 'Introducera grundvatten och be eleven utöka diagrammet.'],
    } : undefined,
    vikarieNotes: [
      'Påsen ska inte stå i direkt sol mer än 20 min — den blir för varm.',
      'Om vattnet inte hinner avdunsta, peka istället på en kall flaska + handflata.',
      'Yngre elever fastnar ofta på "regnet faller ner" — bygg vidare därifrån.',
    ],
  } : {
    title: 'The water cycle',
    summary: `A ${total}-minute lesson where students observe and explain the water cycle.`,
    learningGoal: 'I can explain the water cycle and why it matters for life on Earth.',
    curriculumLinks: {
      identifier: 'no', nameSv: 'Naturorienterande ämnen (NO)',
      centralInnehall: [
        'The different states of water: solid, liquid, gas.',
        'Simple particle model for matter and its cycles.',
      ],
      kriterier: 'The student describes the water cycle using scientific concepts and links it to everyday observations.',
    },
    materialsNeeded: ['Whiteboard', 'Clear plastic bag', 'A little water', 'Tape and a sunny window'],
    phases: [
      { title: 'Observation', durationMinutes: 10, description: 'Set up a mini cycle running in the background.',
        teacherActions: ['Pour water into the bag, tape it on the window.', 'Say: "Glance at it now and then. We\'ll discuss later."'],
        studentActions: ['Watch the bag.', 'Note what they see.'] },
      { title: 'Walk-through', durationMinutes: 25, description: 'Draw the cycle together on the board.',
        teacherActions: ['Draw a lake, sun, cloud, rain on the board.', 'Ask: "What happens between lake and cloud?"', 'Add the terms evaporation, condensation, precipitation.'],
        studentActions: ['Suggest what happens.', 'Copy into notebook.'] },
      { title: 'Application', durationMinutes: total - 40, description: 'Pair up and explain the bag.',
        teacherActions: ['Ask pairs to look at the bag again.', 'Ask: "Where in the cycle is the bag?"'],
        studentActions: ['Discuss in pairs.', 'Explain using the terms.'] },
    ],
    exitExercise: addOns?.exitExercise === false ? undefined : {
      title: 'Three words out', durationMinutes: 5,
      description: 'Each student says one term (evaporation, condensation, precipitation) out loud on the way out.',
    },
    differentiation: addOns?.differentiation ? {
      stod: ['Provide a pre-drawn cycle diagram for labeling.', 'Use a cup + water by hand as a simpler example.'],
      utmaning: ['Ask where saltwater fits in.', 'Introduce groundwater — extend the diagram.'],
    } : undefined,
    vikarieNotes: [
      'Don\'t leave the bag in direct sun for more than 20 minutes — gets too hot.',
      'If evaporation is too slow, point at a cold bottle + warm palm instead.',
      'Younger students often stop at "rain falls" — build from there.',
    ],
  };
}

function genericPlan(isSv, subject, grade, dur, addOns, subjKey, goal) {
  const total = dur || 60;
  return isSv ? {
    title: `Lektion: ${subject}`,
    summary: `En ${total}-minuters lektion i ${subject}${grade ? ' för årskurs ' + grade : ''}.`,
    learningGoal: goal || `Jag kan delta aktivt och förklara dagens nyckelord i ${subject}.`,
    curriculumLinks: {
      identifier: subjKey, nameSv: subject,
      centralInnehall: [`Centralt innehåll för ${subject} hämtas från Skolverket vid riktig generering.`],
      kriterier: 'Betygskriterier hämtas vid riktig generering.',
    },
    materialsNeeded: ['Whiteboard', 'Papper'],
    phases: [
      { title: 'Introduktion', durationMinutes: 10, description: 'Introducera dagens ämne.',
        teacherActions: ['Hälsa klassen.', 'Skriv målet på tavlan.'], studentActions: ['Lyssnar och antecknar.'] },
      { title: 'Huvudaktivitet', durationMinutes: total - 20, description: 'Arbete i par eller individuellt.',
        teacherActions: ['Dela ut uppgift.', 'Stötta efter behov.'], studentActions: ['Arbetar med uppgiften.'] },
      { title: 'Avslutning', durationMinutes: 10, description: 'Sammanfattning.',
        teacherActions: ['Be elever dela en sak de lärt sig.'], studentActions: ['Reflekterar och delar.'] },
    ],
    exitExercise: addOns?.exitExercise === false ? undefined : { title: 'Exit-fråga', durationMinutes: 3, description: 'En sak du tar med dig från idag.' },
    vikarieNotes: ['Detta är ett mockup-svar — riktigt innehåll genereras av LLM med curriculum-injektion.'],
  } : {
    title: `Lesson: ${subject}`,
    summary: `A ${total}-minute lesson in ${subject}${grade ? ' for grade ' + grade : ''}.`,
    learningGoal: goal || `I can participate actively and explain today's key concepts in ${subject}.`,
    curriculumLinks: {
      identifier: subjKey, nameSv: subject,
      centralInnehall: [`Central content for ${subject} loaded from Skolverket at real generation time.`],
      kriterier: 'Grading criteria loaded at real generation time.',
    },
    materialsNeeded: ['Whiteboard', 'Paper'],
    phases: [
      { title: 'Introduction', durationMinutes: 10, description: "Introduce today's topic.",
        teacherActions: ['Welcome the class.', 'Write the goal on the board.'], studentActions: ['Listen and take notes.'] },
      { title: 'Main activity', durationMinutes: total - 20, description: 'Pair or individual work.',
        teacherActions: ['Hand out task.', 'Support as needed.'], studentActions: ['Work on task.'] },
      { title: 'Wrap-up', durationMinutes: 10, description: 'Summary.',
        teacherActions: ['Ask students for one takeaway.'], studentActions: ['Reflect and share.'] },
    ],
    exitExercise: addOns?.exitExercise === false ? undefined : { title: 'Exit question', durationMinutes: 3, description: 'One thing you take with you from today.' },
    vikarieNotes: ['Mockup response — real content is generated by the LLM with curriculum injection.'],
  };
}

// ============================================================
// Tiny hash router so the standalone full page + sub view work
// without React Router.
// ============================================================
function useHashRoute() {
  const [route, setRoute] = useState(window.location.hash || '#/');
  useEffect(() => {
    const onHash = () => setRoute(window.location.hash || '#/');
    window.addEventListener('hashchange', onHash);
    return () => window.removeEventListener('hashchange', onHash);
  }, []);
  return [route, (r) => { window.location.hash = r; }];
}

// Plans saved during this session — keyed by lesson id. In-memory only.
const planStore = (() => {
  const map = new Map();
  return {
    get: (id) => map.get(id),
    set: (id, plan, lesson) => map.set(id, { plan, lesson, savedAt: Date.now() }),
  };
})();

// ============================================================
// App
// ============================================================
function App() {
  const [route, navigate] = useHashRoute();
  const [lang, setLang] = useState('sv');
  const t = T[lang];

  // Route parsing
  const parsed = useMemo(() => parseRoute(route), [route]);

  // Standalone full page route
  if (parsed.kind === 'plan') {
    return <FullPagePlan lessonId={parsed.lessonId} t={t} lang={lang} setLang={setLang} navigate={navigate} />;
  }
  if (parsed.kind === 'sub') {
    return <SubView lessonId={parsed.lessonId} t={t} lang={lang} setLang={setLang} navigate={navigate} />;
  }

  return <CoordinatorApp t={t} lang={lang} setLang={setLang} navigate={navigate} />;
}

function parseRoute(route) {
  // Supports #/plan/{lessonId} and #/sub/{lessonId}
  const stripped = route.replace(/^#/, '');
  const parts = stripped.split('/').filter(Boolean);
  if (parts[0] === 'plan' && parts[1]) return { kind: 'plan', lessonId: parts[1] };
  if (parts[0] === 'sub' && parts[1])  return { kind: 'sub',  lessonId: parts[1] };
  return { kind: 'home' };
}

// ============================================================
// Coordinator app (Daily Cover + Studio)
// ============================================================
function CoordinatorApp({ t, lang, setLang, navigate }) {
  const [view, setView] = useState('list');
  const [quickPlan, setQuickPlan] = useState(null);
  const [generating, setGenerating] = useState(false);

  // Force a re-render when a plan gets saved (so row buttons flip to "View plan")
  const [savedTick, setSavedTick] = useState(0);

  async function handleQuickGenerate(lesson) {
    setGenerating(true);
    setQuickPlan({ lesson, plan: null, saved: false });
    await new Promise(r => setTimeout(r, 700));
    const plan = stubGenerate({
      subject: lesson.subject, subjectKey: lesson.subjectKey, grade: lesson.grade,
      language: lang, durationMinutes: lesson.length,
      addOns: { exitExercise: true },
    });
    setQuickPlan({ lesson, plan, saved: !!planStore.get(lesson.id) });
    setGenerating(false);
  }

  function handleViewSaved(lesson) {
    const stored = planStore.get(lesson.id);
    if (stored) setQuickPlan({ lesson, plan: stored.plan, saved: true });
  }

  function handleSave() {
    if (!quickPlan?.plan) return;
    planStore.set(quickPlan.lesson.id, quickPlan.plan, quickPlan.lesson);
    setQuickPlan({ ...quickPlan, saved: true });
    setSavedTick(s => s + 1);
  }

  return (
    <Shell t={t} lang={lang} setLang={setLang} view={view} setView={setView}>
      {view === 'list' && (
        <DailyCoverList
          key={savedTick}
          lessons={MOCK_LESSONS}
          onQuickGen={handleQuickGenerate}
          onViewSaved={handleViewSaved}
          t={t} lang={lang}
        />
      )}
      {view === 'studio' && <Studio t={t} lang={lang} />}

      {quickPlan && (
        <QuickModal
          lesson={quickPlan.lesson}
          plan={quickPlan.plan}
          generating={generating}
          saved={quickPlan.saved}
          onClose={() => setQuickPlan(null)}
          onRegenerate={() => handleQuickGenerate(quickPlan.lesson)}
          onSave={handleSave}
          onOpenFull={() => { handleSave(); navigate(`/plan/${quickPlan.lesson.id}`); }}
          onSendToSub={() => {
            handleSave();
            const url = `${location.origin}${location.pathname}#/sub/${quickPlan.lesson.id}`;
            navigator.clipboard?.writeText(url);
            alert(t.linkCopied + '\n\n' + url);
          }}
          t={t}
        />
      )}
    </Shell>
  );
}

        <div style={{ fontWeight: 500, marginBottom: 6 }}>
          {plan.curriculumLinks.nameSv}
          <span style={{ color: 'var(--text-tertiary)', fontWeight: 400, marginLeft: 6, fontSize: 12 }}>
            [{plan.curriculumLinks.identifier}]
          </span>
        </div>
        <div style={{ fontSize: 12, color: 'var(--text-secondary)', marginBottom: 4, fontWeight: 500 }}>{t.centralInnehall}</div>
        <ul style={{ margin: '0 0 8px', paddingLeft: 18, fontSize: 13 }}>
          {plan.curriculumLinks.centralInnehall.map((c, i) => <li key={i} style={{ marginBottom: 2 }}>{c}</li>)}
        </ul>
        <div style={{ fontSize: 12, color: 'var(--text-secondary)', marginBottom: 4, fontWeight: 500 }}>{t.kriterier}</div>
        <div style={{ fontSize: 13 }}>{plan.curriculumLinks.kriterier}</div>
      </div>

      {plan.vikarieNotes && plan.vikarieNotes.length > 0 && (
        <>
          <SectionLabel>{t.vikarieNotes}</SectionLabel>
          <ul style={{ margin: 0, paddingLeft: 18, fontSize: 13, color: 'var(--text-secondary)' }}>
            {plan.vikarieNotes.map((n, i) => <li key={i} style={{ marginBottom: 4 }}>{n}</li>)}
          </ul>
        </>
      )}
    </div>
  );
}

function SectionLabel({ children }) {
  return (
    <div style={{
      fontSize: 11, fontWeight: 500, textTransform: 'uppercase', letterSpacing: '0.04em',
      color: 'var(--text-tertiary)', margin: '0 0 6px',
    }}>{children}</div>
  );
}
function PhaseCard({ phase, t, index }) {
  return (
    <div style={{
      border: '0.5px solid var(--border-subtle)', borderRadius: 'var(--radius-md)',
      padding: '10px 12px',
    }}>
      <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'baseline', marginBottom: 4 }}>
        <div style={{ fontWeight: 500, fontSize: 14 }}>
          <span style={{ color: 'var(--text-tertiary)', marginRight: 6 }}>{index}.</span>
          {phase.title}
        </div>
        <div style={{ fontSize: 12, color: 'var(--text-tertiary)' }}>{phase.durationMinutes} {t.min}</div>
      </div>
      <div style={{ fontSize: 13, color: 'var(--text-secondary)', marginBottom: 8 }}>{phase.description}</div>
      <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 10 }}>
        <ActionCol title={t.teacherDoes} items={phase.teacherActions} />
        <ActionCol title={t.studentsDo} items={phase.studentActions} />
      </div>
    </div>
  );
}
function ActionCol({ title, items }) {
  return (
    <div>
      <div style={{ fontSize: 11, fontWeight: 500, color: 'var(--text-tertiary)', marginBottom: 4 }}>{title}</div>
      <ul style={{ margin: 0, paddingLeft: 16, fontSize: 12.5 }}>
        {items.map((a, i) => <li key={i} style={{ marginBottom: 2 }}>{a}</li>)}
      </ul>
    </div>
  );
}
function DiffCol({ title, items, tone }) {
  const bg = tone === 'info' ? 'var(--bg-info)' : 'var(--bg-warning)';
  const fg = tone === 'info' ? 'var(--text-info)' : 'var(--text-warning)';
  return (
    <div style={{ background: bg, borderRadius: 'var(--radius-md)', padding: '10px 12px' }}>
      <div style={{ fontSize: 12, fontWeight: 500, color: fg, marginBottom: 6 }}>{title}</div>
      <ul style={{ margin: 0, paddingLeft: 16, fontSize: 12, color: fg }}>
        {items.map((s, i) => <li key={i} style={{ marginBottom: 3 }}>{s}</li>)}
      </ul>
    </div>
  );
}

// ============================================================
// Full page (printable, shareable)
// ============================================================
function FullPagePlan({ lessonId, t, lang, setLang, navigate }) {
  const stored = planStore.get(lessonId);
  if (!stored) {
    return (
      <Shell t={t} lang={lang} setLang={setLang}>
        <div style={{ padding: 40, textAlign: 'center', color: 'var(--text-tertiary)' }}>
          {lang === 'sv'
            ? 'Ingen lektionsplan hittades. Generera en plan från Daglig täckning först.'
            : 'No plan found. Generate one from Daily Cover first.'}
          <div style={{ marginTop: 16 }}>
            <button onClick={() => navigate('/')} style={ghostBtn()}>{t.backToList}</button>
          </div>
        </div>
      </Shell>
    );
  }
  const { plan, lesson } = stored;
  return (
    <Shell t={t} lang={lang} setLang={setLang}>
      <div className="no-print" style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 16, gap: 8, flexWrap: 'wrap' }}>
        <button onClick={() => navigate('/')} style={ghostBtn()}>← {t.backToList}</button>
        <div style={{ display: 'flex', gap: 8 }}>
          <button onClick={() => {
            const url = `${location.origin}${location.pathname}#/sub/${lessonId}`;
            navigator.clipboard?.writeText(url);
            alert(t.linkCopied + '\n\n' + url);
          }} style={ghostBtn()}>{t.sendToSub}</button>
          <button onClick={() => window.print && window.print()} style={primaryBtn()}>{t.print}</button>
        </div>
      </div>

      <div style={{
        background: 'var(--bg-surface)', border: '0.5px solid var(--border-subtle)',
        borderRadius: 'var(--radius-lg)', padding: '22px 26px',
      }}>
        <div style={{ fontSize: 12, color: 'var(--text-tertiary)', marginBottom: 6, letterSpacing: '0.04em', textTransform: 'uppercase' }}>
          {t.fullPageTitle} · {lesson.class} · {lesson.subject} · {lesson.time}
        </div>
        <PlanView plan={plan} t={t} />
      </div>
    </Shell>
  );
}

// ============================================================
// Substitute view (mobile-optimized read-only)
// ============================================================
function SubView({ lessonId, t, lang, setLang, navigate }) {
  const stored = planStore.get(lessonId);
  if (!stored) {
    return (
      <Shell t={t} lang={lang} setLang={setLang}>
        <div style={{ padding: 40, textAlign: 'center', color: 'var(--text-tertiary)' }}>
          {lang === 'sv'
            ? 'Länk ogiltig eller utgången. (I produktion: signerad token.)'
            : 'Link invalid or expired. (Production: signed token.)'}
        </div>
      </Shell>
    );
  }
  const { plan, lesson } = stored;
  return (
    <div style={{ maxWidth: 480, margin: '0 auto', padding: '18px 16px 60px' }}>
      <div className="no-print" style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 12, gap: 8 }}>
        <div>
          <div style={{ fontSize: 11, color: 'var(--text-tertiary)', textTransform: 'uppercase', letterSpacing: '0.05em' }}>
            {t.subViewSub}
          </div>
          <div style={{ fontSize: 16, fontWeight: 500 }}>{t.subViewTitle}</div>
        </div>
        <LangToggle lang={lang} setLang={setLang} />
      </div>

      <div style={{
        background: 'var(--bg-surface)',
        border: '0.5px solid var(--border-subtle)',
        borderLeft: '3px solid var(--border-warning)',
        borderRadius: 'var(--radius-md)',
        padding: '12px 14px', marginBottom: 18,
      }}>
        <div style={{ fontWeight: 500, fontSize: 15 }}>{lesson.class} · {lesson.subject}</div>
        <div style={{ fontSize: 13, color: 'var(--text-secondary)' }}>
          {lesson.room} · {lesson.time} · {lesson.length} {t.min}
        </div>
      </div>

      <div style={{
        background: 'var(--bg-surface)',
        border: '0.5px solid var(--border-subtle)',
        borderRadius: 'var(--radius-lg)',
        padding: '16px 18px',
      }}>
        <PlanView plan={plan} t={t} compact />
      </div>

      <div className="no-print" style={{ marginTop: 16, display: 'flex', gap: 8 }}>
        <button onClick={() => window.print && window.print()} style={ghostBtn({ flex: 1 })}>{t.print}</button>
      </div>
    </div>
  );
}

// ============================================================
// Helper — plain-text export for clipboard
// ============================================================
function plainText(plan) {
  const lines = [];
  lines.push(plan.title);
  lines.push('');
  lines.push(plan.summary);
  lines.push('');
  lines.push('MÅL: ' + plan.learningGoal);
  lines.push('');
  lines.push('MATERIAL: ' + plan.materialsNeeded.join(', '));
  lines.push('');
  lines.push('LEKTIONSFLÖDE');
  plan.phases.forEach((p, i) => {
    lines.push(`\n${i + 1}. ${p.title} (${p.durationMinutes} min)`);
    lines.push(p.description);
    lines.push('Vikarien: ' + p.teacherActions.map(a => '\n  - ' + a).join(''));
    lines.push('Eleverna: ' + p.studentActions.map(a => '\n  - ' + a).join(''));
  });
  if (plan.exitExercise) {
    lines.push('');
    lines.push(`AVSLUTNING: ${plan.exitExercise.title} (${plan.exitExercise.durationMinutes} min)`);
    lines.push(plan.exitExercise.description);
  }
  if (plan.vikarieNotes?.length) {
    lines.push('');
    lines.push('ANMÄRKNINGAR FÖR VIKARIEN:');
    plan.vikarieNotes.forEach(n => lines.push('  - ' + n));
  }
  return lines.join('\n');
}
