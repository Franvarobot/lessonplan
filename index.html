<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Lektionsplaneraren</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='12' fill='%232B5F8B'/%3E%3Cpath fill='none' stroke='white' stroke-width='3' stroke-linecap='round' stroke-linejoin='round' d='M14 18h14a6 6 0 0 1 6 6v24a4 4 0 0 0-4-4H14zM50 18H36a6 6 0 0 0-6 6v24a4 4 0 0 1 4-4h16z'/%3E%3C/svg%3E" />

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="css/styles.css" />

<!-- React + Babel via CDN. No build step.
     Pinned to Babel 7.23.2 — later versions inject _excluded helpers into
     every script tag independently, causing "already declared" crashes when
     multiple JSX files use object spread in the same global scope. -->
<script crossorigin src="https://cdn.jsdelivr.net/npm/react@18.3.1/umd/react.production.min.js"></script>
<script crossorigin src="https://cdn.jsdelivr.net/npm/react-dom@18.3.1/umd/react-dom.production.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@babel/standalone@7.23.2/babel.min.js"></script>
</head>
<body>
<div id="root"></div>

<!--
  Load order matters. Each file attaches its exports to `window.X`.
  Files without JSX use plain <script>; files with JSX use type="text/babel".
-->

<!-- 1. Data layer (pure constants, no React) -->
<script src="js/data/constants.js"></script>

<!-- 2. Pure helpers (no React) -->
<script src="js/utils/helpers.js"></script>

<!-- 3. i18n (no React) -->
<script src="js/utils/i18n.js"></script>

<!-- 4. Storage (uses React hooks, no JSX) -->
<script src="js/utils/storage.js"></script>

<!-- 5. API + data APIs (no React, no JSX) -->
<script src="js/core/api.js"></script>
<script src="js/core/bankAPI.js"></script>
<script src="js/core/prompts.js"></script>

<!-- 6. UI primitives and components (all have JSX) -->
<script type="text/babel" data-presets="react" src="js/components/Icon.js"></script>
<script type="text/babel" data-presets="react" src="js/components/SettingsModal.js"></script>
<script type="text/babel" data-presets="react" src="js/components/SchoolPicker.js"></script>
<script type="text/babel" data-presets="react" src="js/components/BankView.js"></script>
<script type="text/babel" data-presets="react" src="js/components/LessonCard.js"></script>
<script type="text/babel" data-presets="react" src="js/components/ExtrasTabs.js"></script>
<script type="text/babel" data-presets="react" src="js/components/LessonCardWithTabs.js"></script>
<script type="text/babel" data-presets="react" src="js/components/DetailExtrasControls.js"></script>

<!-- 7. Main App (mounts to #root) -->
<script type="text/babel" data-presets="react" src="js/components/App.js"></script>
</body>
</html>
